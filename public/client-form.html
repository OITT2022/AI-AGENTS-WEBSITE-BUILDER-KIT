<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client - Marketing Agent</title>
  <style>
    :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3345;--text:#e4e6f0;--text2:#9da3b7;--primary:#6366f1;--primary-hover:#818cf8;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--radius:12px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header h1{font-size:20px;font-weight:700}
    .header-actions{display:flex;gap:10px;align-items:center}
    .back-link{color:var(--text2);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;transition:color .15s}.back-link:hover{color:var(--text)}
    .container{padding:28px 32px;max-width:900px;margin:0 auto}
    .btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
    .btn:hover{background:var(--border)}.btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
    .btn-google{background:#fff;color:#333;border:1px solid #ddd;font-weight:600}.btn-google:hover{background:#f8f8f8}
    .btn-green{background:var(--green);border-color:var(--green);color:#fff}
    .btn-lg{padding:14px 28px;font-size:15px}
    .btn-sm{padding:6px 14px;font-size:12px}
    .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
    .section-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .section-header h2{font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px}
    .section-body{padding:24px}
    .form-group{margin-bottom:20px}.form-group:last-child{margin-bottom:0}
    .form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
    .form-group .hint{font-size:11px;color:var(--text2);margin-top:6px;opacity:.7}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    input,select,textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;transition:border-color .15s}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
    textarea{resize:vertical;min-height:70px}
    .error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .success-msg{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .selected-folder{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:14px 16px;margin-top:12px;display:flex;align-items:center;justify-content:space-between}
    .selected-folder .info{display:flex;align-items:center;gap:10px;font-size:14px}
    .drive-account{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
    .drive-account .user{display:flex;align-items:center;gap:10px;font-size:13px}
    .drive-account .user img{width:28px;height:28px;border-radius:50%}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--green);color:var(--text);padding:14px 24px;border-radius:var(--radius);font-size:14px;z-index:1000;animation:slideIn .3s ease}
    @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:768px){.container{padding:16px}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="header">
  <h1 id="page-title">Add Client</h1>
  <div class="header-actions">
    <a class="back-link" href="/dashboard/clients.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Clients
    </a>
  </div>
</div>

<div class="container">
  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- Contact Info -->
  <div class="section">
    <div class="section-header"><h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Client Information
    </h2></div>
    <div class="section-body">
      <div class="form-row">
        <div class="form-group"><label>Contact Name *</label><input type="text" id="f-name" placeholder="Full name" required></div>
        <div class="form-group"><label>Company *</label><input type="text" id="f-company" placeholder="Company name" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email *</label><input type="email" id="f-email" placeholder="client@company.com" required></div>
        <div class="form-group"><label>Phone</label><input type="text" id="f-phone" placeholder="+972-..."></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="f-notes" placeholder="Internal notes about this client..."></textarea></div>
    </div>
  </div>

  <!-- API Connection -->
  <div class="section">
    <div class="section-header"><h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      API Connection
    </h2></div>
    <div class="section-body">
      <div class="form-row">
        <div class="form-group"><label>API Base URL</label><input type="text" id="f-api-url" placeholder="https://www.findus.co.il/api/v1" value="https://www.findus.co.il/api/v1"></div>
        <div class="form-group"><label>API Token (Bearer)</label><input type="password" id="f-api-token" placeholder="Bearer token from provider"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Filter: City</label><input type="text" id="f-filter-city" placeholder="e.g. Larnaca (optional)"></div>
        <div class="form-group"><label>Filter: Property Type</label>
          <select id="f-filter-type"><option value="">All Types</option><option value="Apartment">Apartment</option><option value="Penthouse">Penthouse</option><option value="Villa">Villa</option><option value="Duplex">Duplex</option><option value="Studio">Studio</option></select>
        </div>
      </div>
    </div>
  </div>

  <!-- Google Drive Media -->
  <div class="section">
    <div class="section-header">
      <h2>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Google Drive Media Source
      </h2>
    </div>
    <div class="section-body">
      <!-- Google account status -->
      <div id="drive-account" style="display:none" class="drive-account">
        <div class="user">
          <img id="g-avatar" src="" alt="">
          <div><strong id="g-name"></strong><br><span style="color:var(--text2);font-size:12px" id="g-email"></span></div>
        </div>
        <button class="btn btn-sm" onclick="googleSignOut()">Disconnect</button>
      </div>

      <!-- Sign in button -->
      <div id="drive-signin">
        <p style="color:var(--text2);font-size:13px;margin-bottom:14px">Connect your Google account to browse and select a Drive folder for this client's media assets.</p>
        <button class="btn btn-google" onclick="googleSignIn()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign in with Google
        </button>
      </div>

      <!-- Folder selection (shown after sign-in) -->
      <div id="drive-picker" style="display:none">
        <div class="form-group">
          <label>Media Folder</label>
          <div style="display:flex;gap:10px">
            <input type="text" id="f-drive-url" placeholder="Selected folder will appear here" readonly style="flex:1;cursor:pointer" onclick="openPicker()">
            <button class="btn btn-primary" onclick="openPicker()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              Choose Folder
            </button>
          </div>
          <div class="hint">Opens Google Drive picker to select the folder with images and videos for this client</div>
        </div>

        <div id="selected-folder" style="display:none">
          <div class="selected-folder">
            <div class="info"><span style="font-size:20px">📁</span><span id="sel-folder-name">—</span></div>
            <button class="btn btn-sm" onclick="clearFolder()">Change</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px">
    <a href="/dashboard/clients.html" class="btn">Cancel</a>
    <button class="btn btn-primary btn-lg" onclick="saveClient()" id="btn-save">Save Client</button>
  </div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- Google Picker API -->
<script src="https://apis.google.com/js/api.js" async defer></script>

<script src="/dashboard/shared.js"></script>
<script>
const GOOGLE_CLIENT_ID = '451825178687-53dlr1g9db2lsn3cq7rjc3oje5hog8lf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';
const params = new URLSearchParams(window.location.search);
const editId = params.get('id');
let selectedFolderId = '';
let selectedFolderName = '';
let googleAccessToken = '';
let tokenClient;

async function init() {
  await requireLogin();
  injectNav('clients');

  if (editId) {
    document.getElementById('page-title').textContent = 'Edit Client';
    document.title = 'Edit Client - Marketing Agent';
    await loadClient();
  }

  // Init Google Identity Services
  initGoogleAuth();
}

function initGoogleAuth() {
  // Wait for GIS library to load
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(initGoogleAuth, 200);
    return;
  }

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: handleTokenResponse,
  });

  // Check if we have a cached token
  const cached = sessionStorage.getItem('google_access_token');
  if (cached) {
    googleAccessToken = cached;
    showGoogleAccount();
  }
}

function googleSignIn() {
  if (!tokenClient) { showToast('Google auth loading, try again...'); return; }
  tokenClient.requestAccessToken();
}

function handleTokenResponse(resp) {
  if (resp.error) { showToast('Google sign-in failed: ' + resp.error); return; }
  googleAccessToken = resp.access_token;
  sessionStorage.setItem('google_access_token', googleAccessToken);
  showGoogleAccount();
}

async function showGoogleAccount() {
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${googleAccessToken}` }
    });
    if (!res.ok) { googleSignOut(); return; }
    const user = await res.json();
    document.getElementById('g-avatar').src = user.picture || '';
    document.getElementById('g-name').textContent = user.name || '';
    document.getElementById('g-email').textContent = user.email || '';
    document.getElementById('drive-account').style.display = 'flex';
    document.getElementById('drive-signin').style.display = 'none';
    document.getElementById('drive-picker').style.display = 'block';
  } catch {
    googleSignOut();
  }
}

function googleSignOut() {
  googleAccessToken = '';
  sessionStorage.removeItem('google_access_token');
  document.getElementById('drive-account').style.display = 'none';
  document.getElementById('drive-signin').style.display = 'block';
  document.getElementById('drive-picker').style.display = 'none';
}

// ── Google Picker ──

function openPicker() {
  if (!googleAccessToken) { googleSignIn(); return; }

  gapi.load('picker', () => {
    const folderView = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
      .setSelectFolderEnabled(true)
      .setMimeTypes('application/vnd.google-apps.folder');

    const picker = new google.picker.PickerBuilder()
      .setTitle('Select media folder for this client')
      .addView(folderView)
      .setOAuthToken(googleAccessToken)
      .setCallback(pickerCallback)
      .setOrigin(window.location.origin)
      .build();
    picker.setVisible(true);
  });
}

async function pickerCallback(data) {
  if (data.action === google.picker.Action.PICKED) {
    const folder = data.docs[0];
    selectedFolderId = folder.id;
    selectedFolderName = folder.name;
    document.getElementById('f-drive-url').value = `https://drive.google.com/drive/folders/${folder.id}`;

    document.getElementById('selected-folder').style.display = 'block';
    document.getElementById('sel-folder-name').textContent = folder.name;

    // Count files in the folder
    try {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folder.id}'+in+parents+and+trashed=false&fields=files(id,mimeType)&pageSize=200`, {
        headers: { Authorization: `Bearer ${googleAccessToken}` }
      });
      const files = await res.json();
      const imgs = (files.files || []).filter(f => f.mimeType?.startsWith('image/')).length;
      const vids = (files.files || []).filter(f => f.mimeType?.startsWith('video/')).length;
      document.getElementById('sel-folder-name').textContent = `${folder.name} — ${imgs} images, ${vids} videos`;
    } catch {}
  }
}

function clearFolder() {
  selectedFolderId = '';
  selectedFolderName = '';
  document.getElementById('f-drive-url').value = '';
  document.getElementById('selected-folder').style.display = 'none';
}

// ── Load/Save ──

async function loadClient() {
  const c = await apiCall(`/api/clients/${editId}`);
  if (!c || c.error) return;
  document.getElementById('f-name').value = c.name || c.contact_person || '';
  document.getElementById('f-company').value = c.company || '';
  document.getElementById('f-email').value = c.email || '';
  document.getElementById('f-phone').value = c.phone || '';
  document.getElementById('f-notes').value = c.notes || '';
  document.getElementById('f-api-url').value = c.api_config?.base_url || 'https://www.findus.co.il/api/v1';
  document.getElementById('f-api-token').placeholder = c.api_config?.api_token ? 'Token saved (leave blank to keep)' : 'Bearer token';
  document.getElementById('f-filter-city').value = c.api_config?.filters?.city || '';
  document.getElementById('f-filter-type').value = c.api_config?.filters?.propertyType || '';

  if (c.google_drive_folder_id || c.google_drive_folder_url) {
    selectedFolderId = c.google_drive_folder_id || '';
    document.getElementById('f-drive-url').value = c.google_drive_folder_url || '';
    document.getElementById('selected-folder').style.display = 'block';
    document.getElementById('sel-folder-name').textContent = selectedFolderId;
  }
}

async function saveClient() {
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  const name = document.getElementById('f-name').value.trim();
  const company = document.getElementById('f-company').value.trim();
  const email = document.getElementById('f-email').value.trim();
  if (!name || !company || !email) { errEl.textContent = 'Name, company, and email are required'; errEl.style.display = 'block'; window.scrollTo(0,0); return; }

  const apiToken = document.getElementById('f-api-token').value;
  const driveUrl = document.getElementById('f-drive-url').value.trim();

  const body = {
    name, company, contact_person: name, email,
    phone: document.getElementById('f-phone').value.trim() || undefined,
    notes: document.getElementById('f-notes').value.trim() || undefined,
    google_drive_folder_url: driveUrl || undefined,
    google_drive_folder_id: selectedFolderId || undefined,
  };

  const apiUrl = document.getElementById('f-api-url').value.trim();
  if (apiUrl || apiToken) {
    body.api_config = {
      base_url: apiUrl || 'https://www.findus.co.il/api/v1',
      api_token: apiToken || undefined,
      filters: {
        city: document.getElementById('f-filter-city').value.trim() || undefined,
        propertyType: document.getElementById('f-filter-type').value || undefined,
      },
    };
  }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';

  try {
    if (editId) {
      if (body.api_config && !apiToken) {
        const existing = await apiCall(`/api/clients/${editId}`);
        if (existing.api_config?.api_token) body.api_config.api_token = existing.api_config.api_token;
      }
      await apiCall(`/api/clients/${editId}`, { method: 'PUT', body: JSON.stringify(body) });
      sucEl.textContent = 'Client updated successfully';
      sucEl.style.display = 'block';
      window.scrollTo(0,0);
    } else {
      const res = await apiCall('/api/clients', { method: 'POST', body: JSON.stringify(body) });
      if (res.success) { window.location.href = '/dashboard/clients.html'; return; }
      else { errEl.textContent = res.error || 'Failed to create client'; errEl.style.display = 'block'; }
    }
  } catch (err) {
    errEl.textContent = 'Error saving client';
    errEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Save Client';
}

init();
</script>
</body>
</html>
