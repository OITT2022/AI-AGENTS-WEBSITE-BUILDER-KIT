// Gallery viewer with left/right navigation
let _galleryItems = [];
let _galleryIdx = 0;

function openGallery(vid, startIdx) {
  const v = window._variants?.[vid];
  if (!v) return;
  const mp = v.media_plan_json || {};
  const imgs = (mp.gallery || []).filter(Boolean);
  const vids = (mp.videos || []).filter(Boolean);
  _galleryItems = [
    ...imgs.map(u => ({ type: 'image', url: u })),
    ...vids.map(u => ({ type: 'video', url: u })),
  ];
  if (_galleryItems.length === 0) return;
  _galleryIdx = Math.min(startIdx || 0, _galleryItems.length - 1);
  renderGallery();
}

// ── AI Ad Generator ──

async function generateAiAd(vid) {
  const v = window._variants?.[vid];
  if (!v) return showToast('Variant data not found');

  // Show progress overlay with animated steps
  const overlay = document.createElement('div');
  overlay.className = 'ai-gen-overlay';
  overlay.id = 'ai-gen-overlay';
  overlay.innerHTML = `<div class="ai-gen-modal">
    <h3 style="margin-bottom:4px">Creating Your Video Ad</h3>
    <p style="color:var(--text2);font-size:12px;margin-bottom:8px">${esc(v.entity?.title_he || v.entity?.title_en || '')}</p>
    <div class="render-progress">
      <div class="render-progress-bar"><div class="render-progress-fill" id="render-progress-fill" style="width:5%"></div></div>
    </div>
    <div class="render-steps" id="render-steps">
      <div class="render-step active" id="step-0"><span class="step-icon">&#9881;</span> Preparing assets...</div>
      <div class="render-step" id="step-1"><span class="step-icon">&#9675;</span> Analyzing property media</div>
      <div class="render-step" id="step-2"><span class="step-icon">&#9675;</span> Composing video scenes</div>
      <div class="render-step" id="step-3"><span class="step-icon">&#9675;</span> Rendering with FFmpeg</div>
      <div class="render-step" id="step-4"><span class="step-icon">&#9675;</span> Encoding &amp; optimizing</div>
      <div class="render-step" id="step-5"><span class="step-icon">&#9675;</span> Uploading final video</div>
    </div>
    <div style="font-size:11px;color:var(--text2)" id="render-elapsed"></div>
  </div>`;
  document.body.appendChild(overlay);

  // Animate progress steps during API call + rendering
  const renderStartTime = Date.now();
  let currentStep = 0;
  const stepTimings = [0, 3000, 6000, 10000, 25000, 40000]; // approximate ms per step
  const stepLabels = [
    '&#9881; Preparing assets...',
    '&#128269; Analyzing property media',
    '&#127916; Composing video scenes',
    '&#9654; Rendering with FFmpeg',
    '&#128190; Encoding &amp; optimizing',
    '&#9729; Uploading final video',
  ];
  window._renderProgressInterval = setInterval(() => {
    const elapsed = Date.now() - renderStartTime;
    const elapsedEl = document.getElementById('render-elapsed');
    if (elapsedEl) elapsedEl.textContent = `${Math.floor(elapsed / 1000)}s elapsed`;

    // Advance steps based on time
    let newStep = 0;
    for (let i = stepTimings.length - 1; i >= 0; i--) {
      if (elapsed >= stepTimings[i]) { newStep = i; break; }
    }
    if (newStep > currentStep) {
      for (let i = currentStep; i < newStep; i++) {
        const el = document.getElementById('step-' + i);
        if (el) { el.className = 'render-step done'; el.querySelector('.step-icon').innerHTML = '&#10003;'; }
      }
      const activeEl = document.getElementById('step-' + newStep);
      if (activeEl) { activeEl.className = 'render-step active'; activeEl.querySelector('.step-icon').innerHTML = stepLabels[newStep].match(/^[^<]*(<[^>]+>)?([^<]+)/)?.[0]?.match(/^[^ ]+/)?.[0] || '&#9881;'; }
      currentStep = newStep;
    }

    // Smooth progress bar (cap at 90% until actually done)
    const maxProgress = Math.min(90, Math.floor((elapsed / 55000) * 100));
    const fill = document.getElementById('render-progress-fill');
    if (fill) fill.style.width = maxProgress + '%';
  }, 500);

  try {
    // Collect current form values so the video uses the latest edits
    const hlEl = document.getElementById('hl-' + vid);
    const descEl = document.getElementById('desc-' + vid);
    const ctaEl = document.getElementById('cta-' + vid);
    const urlEl = document.getElementById('url-' + vid);
    const tagsEl = document.getElementById('tags-' + vid);
    const textEl = document.getElementById('text-' + vid);
    // Get sound override from the Edit Media sound picker
    const soundSel = document.getElementById('sound-' + vid);
    const soundOverride = soundSel?.value || undefined;

    const reqBody = {
      headline: hlEl?.value || undefined,
      description: descEl?.value || undefined,
      cta: ctaEl?.value || undefined,
      ad_url: urlEl?.value || undefined,
      hashtags: tagsEl?.value || undefined,
      primary_text: textEl?.innerText || undefined,
      sound_id: soundOverride, // overrides preset default
    };
    const res = await apiCall(`/api/generate/ai-ad/${vid}`, { method: 'POST', body: JSON.stringify(reqBody) });

    const modal = overlay.querySelector('.ai-gen-modal');
    if (!res.success) {
      clearInterval(window._renderProgressInterval);
      modal.innerHTML = `<h3 style="color:var(--red);margin-bottom:12px">Generation Failed</h3>
        <p style="color:var(--text2);font-size:14px">${esc(res.error || 'Unknown error')}</p>
        <button class="btn btn-sm" style="margin-top:16px" onclick="document.getElementById('ai-gen-overlay')?.remove();switchTab('creatives')">Close</button>`;
      return;
    }

    const gen = res.generated || {};
    const localVideo = gen.local_video;

    // If video is still rendering on EC2, keep the animated progress and poll
    if (localVideo && localVideo.status === 'processing') {
      // Progress animation keeps running — just start polling for completion
      setTimeout(() => pollVideoStatus(vid), 5000);
      return; // DO NOT replace modal — keep the progress steps visible
    }

    // Video done or no video — show results
    clearInterval(window._renderProgressInterval);
    const scenes = gen.scene_images || [];
    const video = gen.video;
    const canvaDesign = gen.canva_design;
    const used = res.services_used || [];

    let html = `<h3 style="margin-bottom:4px">AI Ad Assets Generated</h3>
      <p style="color:var(--text2);font-size:12px;margin-bottom:16px">Services: ${used.join(', ') || 'none'}</p>`;

    if (scenes.length > 0) {
      html += `<div style="font-size:13px;font-weight:600;margin-bottom:8px;text-align:left">Scene Images (${scenes.length})</div>`;
      html += `<div class="ai-gen-results">`;
      for (const s of scenes) {
        html += `<div class="ai-gen-scene">
          <img src="${esc(s.url)}" onclick="openLightbox('${esc(s.url)}')" loading="lazy" onerror="this.style.background='var(--surface2)'">
          <div class="ai-gen-scene-label">Scene ${s.scene}: ${esc(s.overlay)}</div>
        </div>`;
      }
      html += `</div>`;
    }

    if (video) {
      html += `<div style="font-size:13px;font-weight:600;margin:16px 0 8px;text-align:left">Video (AI)</div>
        <a href="${esc(video.url)}" target="_blank" class="btn btn-sm btn-primary" style="text-decoration:none">
          &#9654; Watch ${video.duration_sec}s video (${video.provider})
        </a>`;
    }

    if (localVideo && localVideo.url) {
      html += `<div style="font-size:13px;font-weight:600;margin:16px 0 8px;text-align:left">Video (Local Slideshow)</div>
        <video controls preload="metadata" style="width:100%;max-width:360px;border-radius:8px;margin-bottom:4px">
          <source src="/api/media/video/${vid}" type="video/mp4">
        </video>
        <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Generated locally via VideoEngine</div>
        <button class="btn btn-sm btn-green" id="save-video-btn" onclick="saveGeneratedVideo('${vid}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          Save Video to Creative
        </button>`;
    }

    if (canvaDesign) {
      html += `<div style="font-size:13px;font-weight:600;margin:16px 0 8px;text-align:left">Canva Design</div>
        <a href="${esc(canvaDesign.edit_url)}" target="_blank" class="btn btn-sm" style="text-decoration:none">
          Edit in Canva
        </a>`;
    }

    if (res.errors?.length) {
      html += `<div style="font-size:12px;color:var(--text2);margin-top:16px;text-align:left">
        <details><summary style="cursor:pointer">Warnings (${res.errors.length})</summary>
        ${res.errors.map(e => `<div style="margin-top:4px">${esc(e.service)}: ${esc(e.error)}</div>`).join('')}
        </details></div>`;
    }

    html += `<button class="btn btn-sm" style="margin-top:20px" onclick="document.getElementById('ai-gen-overlay')?.remove();switchTab('creatives')">Close</button>`;
    modal.innerHTML = html;

    // Update variant data in memory
    if (v.media_plan_json) {
      v.media_plan_json.ai_generated = { scene_images: scenes, video, local_video: gen.local_video || null, canva_design: canvaDesign, generated_at: new Date().toISOString(), services_used: used };
    }
  } catch (err) {
    clearInterval(window._renderProgressInterval);
    document.getElementById('ai-gen-overlay')?.remove();
    showToast('AI generation failed: ' + (err.message || err));
  }
}

async function saveGeneratedVideo(variantId) {
  const btn = document.getElementById('save-video-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  try {
    const v = window._variants?.[variantId];
    if (!v) throw new Error('Variant not found');
    const mp = { ...v.media_plan_json };
    const localVideo = mp.ai_generated?.local_video;
    if (!localVideo?.url) throw new Error('No video to save');

    // Save the generated video URL into the variant's media plan
    mp.saved_video = {
      url: localVideo.url,
      provider: localVideo.provider || 'video-engine-local',
      status: localVideo.status || 'completed',
      size_bytes: localVideo.size_bytes || 0,
      duration_sec: localVideo.duration_sec || 0,
      saved_at: new Date().toISOString()
    };

    const res = await apiCall(`/api/creatives/${variantId}`, { method: 'PUT', body: JSON.stringify({ media_plan_json: mp }) });
    if (res.success) {
      v.media_plan_json = mp;
      showToast('Video saved to creative');
      if (btn) { btn.textContent = 'Saved'; btn.classList.remove('btn-green'); btn.style.opacity = '0.7'; }
      // Update the card to show the saved video
      updateCardWithSavedVideo(variantId, mp.saved_video);
    } else {
      throw new Error(res.error || 'Save failed');
    }
  } catch (err) {
    showToast('Failed to save video: ' + (err.message || err));
    if (btn) { btn.disabled = false; btn.textContent = 'Save Video to Creative'; }
  }
}

function updateCardWithSavedVideo(variantId, savedVideo) {
  const card = document.getElementById('card-' + variantId);
  if (!card || !savedVideo) return;
  // Remove existing saved-video section if present
  const existing = card.querySelector('.saved-video-section');
  if (existing) existing.remove();
  // Insert saved video section before the card footer
  const footer = card.querySelector('.card-footer');
  if (!footer) return;
  const section = document.createElement('div');
  section.className = 'saved-video-section';
  section.style.cssText = 'padding:10px 20px;border-top:1px solid var(--border)';
  section.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:12px;font-weight:600;color:var(--text)">Saved Video</span>
      <span class="badge badge-green" style="font-size:10px">Ready</span>
    </div>
    <video controls preload="metadata" style="width:100%;max-width:320px;border-radius:8px;border:1px solid var(--border)">
      <source src="/api/media/video/${variantId}" type="video/mp4">
    </video>
    <div style="font-size:10px;color:var(--text2);margin-top:4px">
      ${savedVideo.duration_sec ? savedVideo.duration_sec + 's' : ''} ${savedVideo.size_bytes ? '· ' + (savedVideo.size_bytes / 1024 / 1024).toFixed(1) + ' MB' : ''}
      · Saved ${new Date(savedVideo.saved_at).toLocaleDateString()}
    </div>`;
  footer.parentNode.insertBefore(section, footer);
}

async function pollVideoStatus(variantId, attempt = 0) {
  if (attempt > 60) { // 60 × 5s = 5 min max
    clearInterval(window._renderProgressInterval);
    const el = document.getElementById('video-poll-status');
    if (el) el.innerHTML = '<div style="color:var(--red);padding:16px">Video render timed out. Please try again.</div>';
    return;
  }
  try {
    const res = await apiCall(`/api/video/status/${variantId}`);
    if (res.status === 'completed' && res.local_video?.url) {
      // Complete! Mark all steps done, fill progress to 100%
      clearInterval(window._renderProgressInterval);
      const fill = document.getElementById('render-progress-fill');
      if (fill) fill.style.width = '100%';
      for (let i = 0; i < 6; i++) {
        const step = document.getElementById('step-' + i);
        if (step) { step.className = 'render-step done'; step.querySelector('.step-icon').innerHTML = '&#10003;'; }
      }
      const elapsedEl = document.getElementById('render-elapsed');
      if (elapsedEl) elapsedEl.textContent = 'Complete!';

      // Show the video after a brief celebration
      setTimeout(() => {
        const modal = document.querySelector('.ai-gen-modal');
        if (modal) {
          modal.innerHTML = `
            <h3 style="margin-bottom:4px">Video Ad Ready</h3>
            <p style="color:#22c55e;font-size:13px;margin-bottom:16px">&#10003; Successfully rendered</p>
            <video controls autoplay muted preload="auto" style="width:100%;max-width:400px;border-radius:10px;margin-bottom:12px;border:2px solid var(--primary)">
              <source src="/api/media/video/${variantId}" type="video/mp4">
            </video>
            <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
              <button class="btn btn-sm btn-green" id="save-video-btn" onclick="saveGeneratedVideo('${variantId}')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
                Save Video to Creative
              </button>
              <a href="/api/media/video/${variantId}/download" class="btn btn-sm" style="text-decoration:none">Download</a>
            </div>
            <button class="btn btn-sm" onclick="document.getElementById('ai-gen-overlay')?.remove();switchTab('creatives')">Close</button>`;
        }
      }, 800);

      // Auto-save the video to the creative
      const v = window._variants?.[variantId];
      if (v?.media_plan_json) {
        v.media_plan_json.ai_generated = { ...v.media_plan_json.ai_generated, local_video: res.local_video };
        v.media_plan_json.saved_video = {
          url: res.local_video.url,
          provider: res.local_video.provider || 'video-engine-local',
          status: 'completed',
          size_bytes: res.local_video.size_bytes || 0,
          duration_sec: res.local_video.duration_sec || 0,
          saved_at: new Date().toISOString(),
        };
        // Persist to DB
        apiCall(`/api/creatives/${variantId}`, { method: 'PUT', body: JSON.stringify({ media_plan_json: v.media_plan_json }) }).catch(() => {});
      }
      return;
    }
  } catch (e) { /* keep polling */ }
  setTimeout(() => pollVideoStatus(variantId, attempt + 1), 5000);
}

function openLightbox(src) {
  _galleryItems = [{ type: 'image', url: src }];
  _galleryIdx = 0;
  renderGallery();
}

function renderGallery() {
  closeGallery();
  const item = _galleryItems[_galleryIdx];
  if (!item) return;
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.id = 'gallery-overlay';
  lb.onclick = (e) => { if (e.target === lb) closeGallery(); };

  const counter = _galleryItems.length > 1 ? `<span class="gallery-counter">${_galleryIdx + 1} / ${_galleryItems.length}</span>` : '';
  const prevBtn = _galleryItems.length > 1 ? `<button class="gallery-nav gallery-prev" onclick="event.stopPropagation();galleryNav(-1)">&#10094;</button>` : '';
  const nextBtn = _galleryItems.length > 1 ? `<button class="gallery-nav gallery-next" onclick="event.stopPropagation();galleryNav(1)">&#10095;</button>` : '';

  let content;
  if (item.type === 'video') {
    const isDrive = item.url.includes('drive.google.com');
    if (isDrive) {
      // Drive videos can't be embedded cross-origin — show thumbnail + open link
      const driveId = (item.url.match(/\/d\/([a-zA-Z0-9_-]+)/)||[])[1];
      const thumbUrl = driveId ? `https://drive.google.com/thumbnail?id=${driveId}&sz=w800` : '';
      const openUrl = driveId ? `https://drive.google.com/file/d/${driveId}/view` : item.url;
      content = `<div style="text-align:center">
        ${thumbUrl ? `<img src="${esc(thumbUrl)}" style="max-width:80vw;max-height:60vh;border-radius:8px;margin-bottom:16px" onerror="this.style.display='none'">` : ''}
        <div style="margin-top:8px">
          <a href="${esc(openUrl)}" target="_blank" class="btn btn-primary" style="text-decoration:none;font-size:14px;padding:12px 24px">&#9654; Open Video in Google Drive</a>
        </div>
        <div style="font-size:11px;color:#9da3b7;margin-top:8px">Google Drive videos open in a new tab</div>
      </div>`;
    } else {
      content = `<video src="${esc(item.url)}" controls autoplay style="max-width:90vw;max-height:80vh;border-radius:8px"></video>`;
    }
  } else {
    content = `<img src="${esc(item.url)}" style="max-width:90vw;max-height:80vh;border-radius:8px">`;
  }

  lb.innerHTML = `
    <button class="lightbox-close" onclick="closeGallery()">&#10005;</button>
    ${prevBtn}
    ${content}
    ${nextBtn}
    ${counter}
  `;
  document.body.appendChild(lb);
}

function galleryNav(dir) {
  _galleryIdx = (_galleryIdx + dir + _galleryItems.length) % _galleryItems.length;
  renderGallery();
}

function closeGallery() {
  document.getElementById('gallery-overlay')?.remove();
}

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('gallery-overlay')) return;
  if (e.key === 'ArrowLeft') galleryNav(-1);
  else if (e.key === 'ArrowRight') galleryNav(1);
  else if (e.key === 'Escape') closeGallery();
});
function esc(s) { return escapeHtml(s); }

init();
</script>
