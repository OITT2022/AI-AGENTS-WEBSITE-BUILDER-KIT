version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        # Assemble .amplify-hosting structure for SSR compute
        - rm -rf .amplify-hosting
        - mkdir -p .amplify-hosting/compute/default
        - mkdir -p .amplify-hosting/static
        # Copy server code
        - cp -r dist/* .amplify-hosting/compute/default/
        - cp package.json .amplify-hosting/compute/default/package.json
        - cp -r node_modules .amplify-hosting/compute/default/node_modules
        # Copy db schema files (used by initDatabase)
        - mkdir -p .amplify-hosting/compute/default/db
        - cp db/schema.sql .amplify-hosting/compute/default/db/
        - cp db/migration.sql .amplify-hosting/compute/default/db/
        # Debug - check if env vars exist during build
        - echo "DEBUG DATABASE_URL set = $(if [ -n \"$DATABASE_URL\" ]; then echo YES; else echo NO; fi)"
        - echo "DEBUG DB_PROVIDER = ${DB_PROVIDER:-not set}"
        - echo "DEBUG all env vars with DB:" && env | grep -i "DB_\|DATABASE" || echo "none found"
        # Write ALL environment variables to .env for the compute function
        # (Amplify SSR compute does not inject env vars at runtime)
        - env > .amplify-hosting/compute/default/.env
        - echo "DEBUG .env line count:" && wc -l .amplify-hosting/compute/default/.env
        # Entry point - HTTP server on port 3000
        - cp .amplify-hosting/compute/default/amplify-entry.js .amplify-hosting/compute/default/index.js
        # Copy public files into compute so Express can serve them
        - cp -r public .amplify-hosting/compute/default/public
        # Also copy to static for CDN caching
        - cp -r public/* .amplify-hosting/static/ || true
        # Deploy manifest
        - cp deploy-manifest.json .amplify-hosting/deploy-manifest.json
        - echo "Build complete. Contents:"
        - ls -la .amplify-hosting/
        - ls -la .amplify-hosting/compute/default/index.js
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
