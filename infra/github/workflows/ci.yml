name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build

  qa:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: pnpm install --frozen-lockfile=false
      - run: npx playwright install --with-deps chromium
      - name: Start services
        run: |
          cd apps/orchestrator && pnpm dev &
          cd apps/dashboard && pnpm dev &
          sleep 10
      - name: Run QA tests
        run: cd agents/qa-agent && pnpm test
        env:
          QA_TARGET_URL: http://localhost:3001
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-reports
          path: agents/qa-agent/reports/
