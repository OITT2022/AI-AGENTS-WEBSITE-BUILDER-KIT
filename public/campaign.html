<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Campaign Dashboard - Marketing Agent</title>
  <style>
    :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3345;--text:#e4e6f0;--text2:#9da3b7;--primary:#6366f1;--primary-hover:#818cf8;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;--radius:12px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
    .header-actions{display:flex;gap:10px;align-items:center}
    .back-link{color:var(--text2);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;transition:color .15s}.back-link:hover{color:var(--text)}
    .container{padding:24px 32px;max-width:1600px;margin:0 auto}
    .btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
    .btn:hover{background:var(--border)}.btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
    .btn-green{background:var(--green);border-color:var(--green);color:#fff}
    .btn-red{background:var(--red);border-color:var(--red);color:#fff}
    .btn-sm{padding:5px 10px;font-size:12px}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .badge-green{background:rgba(34,197,94,.15);color:var(--green)}.badge-yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
    .badge-red{background:rgba(239,68,68,.15);color:var(--red)}.badge-blue{background:rgba(59,130,246,.15);color:var(--blue)}
    .badge-purple{background:rgba(99,102,241,.15);color:var(--primary)}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
    .stat-card .label{color:var(--text2);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .stat-card .value{font-size:32px;font-weight:700}
    .stat-card .sub{color:var(--text2);font-size:13px;margin-top:4px}
    .tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border-radius:var(--radius);padding:4px;border:1px solid var(--border);width:fit-content}
    .tab{padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;border:none;background:transparent}
    .tab.active{background:var(--primary);color:#fff}.tab:hover:not(.active){color:var(--text);background:var(--surface2)}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s;position:relative}.card:hover{border-color:var(--primary)}
    .card.selected-card{border-color:var(--red);box-shadow:0 0 0 1px var(--red)}
    .card-cover{width:100%;height:180px;object-fit:cover;display:block;background:var(--surface2)}
    .card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
    .card-header h3{font-size:15px;font-weight:600;line-height:1.4}
    .card-body{padding:16px 20px}
    .card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .detail-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;align-items:center}.detail-row .label{color:var(--text2);flex-shrink:0}
    .score-bar{display:flex;align-items:center;gap:10px;margin-top:12px}
    .score-bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
    .score-bar-fill{height:100%;border-radius:3px;transition:width .3s ease}
    .score-value{font-size:14px;font-weight:700;min-width:40px;text-align:right}
    .platforms{display:flex;gap:6px;margin-top:8px}
    .platform-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
    .platform-facebook{background:rgba(24,119,242,.15);color:#1877f2}.platform-instagram{background:rgba(228,64,95,.15);color:#e4405f}
    .platform-tiktok{background:rgba(0,0,0,.3);color:#fff;border:1px solid var(--border)}
    .media-strip{display:flex;gap:6px;margin-top:12px;overflow-x:auto;padding-bottom:6px}
    .media-strip img,.media-strip .media-placeholder{width:100px;height:75px;object-fit:cover;border-radius:6px;border:1px solid var(--border);flex-shrink:0;cursor:pointer;transition:border-color .15s,transform .15s}
    .media-strip img:first-child,.media-strip .media-placeholder:first-child{width:160px;height:120px;border-color:var(--primary)}
    .media-strip img:hover{border-color:var(--primary);transform:scale(1.03)}
    .media-placeholder{background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:11px;text-align:center;padding:4px}
    .media-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
    .media-grid-item{position:relative;width:80px;height:60px;border-radius:6px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:all .15s}
    .media-grid-item.selected{border-color:var(--green)}.media-grid-item.selected::after{content:'\\2713';position:absolute;top:2px;right:4px;color:var(--green);font-size:14px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.8)}
    .media-grid-item img,.media-grid-item video{width:100%;height:100%;object-fit:cover}
    .media-view-btn{position:absolute;top:2px;left:2px;background:rgba(0,0,0,.6);color:#fff;border:none;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;padding:0;line-height:1}
    .media-grid-item:hover .media-view-btn{opacity:1}
    .media-grid-item .vid-badge{position:absolute;bottom:2px;left:4px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;padding:1px 4px;border-radius:3px}
    .creative-preview{background:var(--bg);border-radius:8px;padding:14px;margin-top:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto}
    .creative-preview[contenteditable=true]{border:1px solid var(--border);cursor:text}
    .creative-preview[contenteditable=true]:focus{border-color:var(--primary);outline:none}
    .card-select{position:static;width:16px;height:16px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
    .card-delete{position:absolute;top:12px;right:12px;z-index:2;background:rgba(239,68,68,.9);color:#fff;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
    .card:hover .card-delete{opacity:1}
    .bulk-bar{background:var(--surface);border:1px solid var(--red);border-radius:var(--radius);padding:12px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:flex;align-items:center;justify-content:center}
    .lightbox img,.lightbox video{max-width:90vw;max-height:80vh;border-radius:8px}
    .lightbox-close{position:absolute;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;z-index:2}
    .gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);color:#fff;border:none;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:2}
    .gallery-nav:hover{background:rgba(255,255,255,.25)}
    .gallery-prev{left:20px}.gallery-next{right:20px}
    .gallery-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:14px;font-weight:500;background:rgba(0,0,0,.5);padding:4px 14px;border-radius:20px}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text2)}.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text)}
    .loading{text-align:center;padding:40px;color:var(--text2)}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--green);color:var(--text);padding:14px 24px;border-radius:var(--radius);font-size:14px;z-index:1000;animation:slideIn .3s ease}
    @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* Preview overlay */
    .preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
    .preview-popup{background:var(--bg);border-radius:var(--radius);max-width:500px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
    .preview-popup-close{position:absolute;top:12px;right:16px;color:var(--text2);font-size:24px;cursor:pointer;background:none;border:none;z-index:2}
    .preview-popup-close:hover{color:var(--text)}
    .preview-popup-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600}
    .prev-tab{flex:1;padding:8px 12px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
    .prev-tab.active{background:var(--surface);color:var(--text)}.prev-tab:hover:not(.active){color:var(--text)}

    /* Storyboard */
    .storyboard{display:flex;gap:4px;overflow-x:auto;padding:12px 0}
    .storyboard-scene{flex-shrink:0;width:100px;background:var(--surface2);border-radius:6px;overflow:hidden;border:1px solid var(--border);font-size:10px}
    .storyboard-scene img,.storyboard-scene video{width:100%;height:56px;object-fit:cover;display:block}
    .storyboard-scene .scene-info{padding:4px 6px}
    .storyboard-scene .scene-time{color:var(--primary);font-weight:600}
    .storyboard-scene .scene-text{color:var(--text2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    /* FB preview */
    .fb-card{background:#fff;border-radius:8px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#050505;overflow:hidden}
    .fb-header{padding:12px 16px;display:flex;align-items:center;gap:10px}
    .fb-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
    .fb-name{font-weight:700;font-size:14px}.fb-meta{font-size:12px;color:#65676B}
    .fb-text{padding:0 16px 12px;font-size:15px;line-height:1.5;white-space:pre-wrap}
    .fb-image{width:100%;aspect-ratio:1.91/1;object-fit:cover;display:block}
    .fb-carousel{display:flex;overflow-x:auto;gap:0;scroll-snap-type:x mandatory}.fb-carousel img{width:100%;flex-shrink:0;scroll-snap-align:start;aspect-ratio:1/1;object-fit:cover}
    .fb-link-bar{background:#f0f2f5;padding:12px 16px}
    .fb-link-domain{font-size:12px;color:#65676B;text-transform:uppercase}
    .fb-link-title{font-size:16px;font-weight:700;margin-top:2px}
    .fb-link-desc{font-size:14px;color:#65676B;margin-top:2px}
    .fb-cta-btn{background:#e4e6eb;color:#050505;border:none;padding:8px 16px;border-radius:6px;font-weight:600;font-size:14px}
    .fb-actions{display:flex;gap:4px;padding:8px 16px;border-top:1px solid #ddd}
    .fb-action{flex:1;text-align:center;padding:8px;font-size:14px;font-weight:600;color:#65676B}
    .fb-video-overlay{position:relative}.fb-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)}
    .fb-play-icon{width:60px;height:60px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}

    /* IG preview */
    .ig-card{background:#000;border-radius:8px;font-family:-apple-system,sans-serif;color:#fff;overflow:hidden}
    .ig-header{padding:10px 14px;display:flex;align-items:center;gap:10px}
    .ig-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;border:2px solid #c13584;flex-shrink:0}
    .ig-name{font-weight:600;font-size:13px;flex:1}.ig-sponsored{font-size:11px;color:#a8a8a8}
    .ig-image{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
    .ig-carousel{position:relative;overflow:hidden}.ig-carousel-inner{display:flex;transition:transform .3s}.ig-carousel-inner img{width:100%;flex-shrink:0;aspect-ratio:1/1;object-fit:cover}
    .ig-dots{text-align:center;padding:8px 0}.ig-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#555;margin:0 3px}.ig-dot.active{background:#0095f6}
    .ig-actions-bar{padding:10px 14px;display:flex;gap:16px}
    .ig-action-icon{width:24px;height:24px}
    .ig-caption{padding:0 14px 12px;font-size:13px;line-height:1.5}
    .ig-caption .cname{font-weight:600}
    .ig-hashtags{color:#e0f1ff;font-size:13px;margin-top:4px}
    .ig-cta-bar{background:#0095f6;text-align:center;padding:10px;font-weight:600;font-size:14px}

    /* TK preview */
    .tk-card{background:#000;border-radius:12px;max-width:320px;margin:0 auto;font-family:-apple-system,sans-serif;color:#fff;overflow:hidden;position:relative;aspect-ratio:9/16}
    .tk-bg{position:absolute;inset:0}.tk-bg img,.tk-bg video{width:100%;height:100%;object-fit:cover;filter:brightness(.7)}
    .tk-overlay{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:16px}
    .tk-hook{position:absolute;top:60px;left:16px;right:60px;z-index:2;font-size:20px;font-weight:800;line-height:1.3;text-shadow:0 2px 8px rgba(0,0,0,.8)}
    .tk-sponsored{position:absolute;top:14px;left:14px;z-index:2;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600}
    .tk-right{position:absolute;right:12px;bottom:120px;display:flex;flex-direction:column;gap:16px;align-items:center;z-index:2}
    .tk-right-btn{text-align:center;font-size:11px}
    .tk-right-icon{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:3px}
    .tk-name{font-weight:700;font-size:15px;margin-bottom:4px}
    .tk-desc{font-size:13px;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .tk-cta{background:#fe2c55;color:#fff;border:none;padding:10px 24px;border-radius:4px;font-weight:700;font-size:14px;display:inline-block}

    @media(max-width:768px){.container{padding:16px}.card-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>

<div class="header">
  <h1 id="page-title">Campaign Dashboard</h1>
  <div class="header-actions">
    <a class="back-link" href="/dashboard/clients.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      All Clients
    </a>
    <button class="btn" onclick="loadAll()">Refresh</button>
    <button class="btn" id="btn-drive" onclick="syncDrive()" style="display:none">Sync Drive</button>
    <button class="btn btn-primary" id="btn-sync" onclick="syncClient()" style="display:none">Sync & Create</button>
    <button class="btn btn-primary" id="btn-pipeline" onclick="runPipeline()">Run Pipeline</button>
  </div>
</div>

<div class="container">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('candidates')">Candidates</button>
    <button class="tab" onclick="switchTab('creatives')">Creatives</button>
    <button class="tab" onclick="switchTab('approvals')">Approvals</button>
    <button class="tab" onclick="switchTab('properties')">Properties</button>
  </div>
  <div id="bulk-actions" style="display:none">
    <div class="bulk-bar">
      <span id="bulk-count" style="font-weight:600">0 selected</span>
      <button class="btn btn-sm btn-red" onclick="bulkDelete()">Delete Selected</button>
      <button class="btn btn-sm" onclick="clearSelection()">Clear</button>
    </div>
  </div>
  <div id="delete-all-bar" style="display:none;margin-bottom:16px">
    <button class="btn btn-red" onclick="deleteAllUnapproved()">Delete All Unapproved Creatives</button>
    <span style="color:var(--text2);font-size:12px;margin-left:10px">Approved creatives will be kept</span>
  </div>
  <div id="tab-content"><div class="loading">Loading...</div></div>
</div>

<script src="/dashboard/shared.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const clientId = params.get('client');
let clientData = null;
let currentTab = 'candidates';
let selectedVariants = new Set();

async function init() {
  await requireLogin();
  injectNav('clients');
  if (!clientId) { document.getElementById('tab-content').innerHTML = '<div class="empty-state"><h3>No client selected</h3></div>'; return; }
  clientData = await apiCall(`/api/clients/${clientId}`);
  document.getElementById('page-title').textContent = clientData.company || clientData.name || 'Campaign';
  document.title = `${clientData.company} - Campaign Dashboard`;
  if (clientData.api_config?.api_token) document.getElementById('btn-sync').style.display = 'inline-flex';
  if (clientData.google_drive_folder_id) document.getElementById('btn-drive').style.display = 'inline-flex';
  loadAll();
}

async function loadAll() { await Promise.all([loadStats(), loadTab(currentTab)]); }

async function loadStats() {
  const d = await apiCall(`/api/clients/${clientId}/dashboard`);
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="label">Properties</div><div class="value">${d.total_entities}</div><div class="sub">${d.campaign_ready} campaign ready</div></div>
    <div class="stat-card"><div class="label">Candidates</div><div class="value">${d.selected_candidates}</div><div class="sub">${d.total_candidates} scored</div></div>
    <div class="stat-card"><div class="label">Creatives</div><div class="value">${d.total_variants}</div><div class="sub">${d.total_batches} batches</div></div>
    <div class="stat-card"><div class="label">Pending</div><div class="value" style="color:var(--yellow)">${d.approvals_pending}</div><div class="sub">${d.approvals_approved} approved</div></div>
    <div class="stat-card"><div class="label">QA Pass</div><div class="value" style="color:var(--green)">${d.qa_pass}</div><div class="sub">${d.qa_warn} warn, ${d.qa_fail} fail</div></div>
  `;
}

function switchTab(tab) {
  currentTab = tab;
  selectedVariants.clear(); updateBulkBar();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('delete-all-bar').style.display = tab === 'creatives' ? 'block' : 'none';
  loadTab(tab);
}

async function loadTab(tab) {
  const el = document.getElementById('tab-content');
  el.innerHTML = '<div class="loading">Loading...</div>';
  switch(tab) {
    case 'candidates': return renderCandidates(el);
    case 'creatives': return renderCreatives(el);
    case 'approvals': return renderApprovals(el);
    case 'properties': return renderProperties(el);
  }
}

// ── Selection / Bulk Delete ──

function toggleSelect(vid, cb) {
  if (cb.checked) { selectedVariants.add(vid); document.getElementById('card-'+vid)?.classList.add('selected-card'); }
  else { selectedVariants.delete(vid); document.getElementById('card-'+vid)?.classList.remove('selected-card'); }
  updateBulkBar();
}
function updateBulkBar() {
  const bar = document.getElementById('bulk-actions');
  if (selectedVariants.size > 0) { bar.style.display = 'block'; document.getElementById('bulk-count').textContent = selectedVariants.size + ' selected'; }
  else { bar.style.display = 'none'; }
}
function clearSelection() {
  selectedVariants.clear();
  document.querySelectorAll('.card-select').forEach(cb => cb.checked = false);
  document.querySelectorAll('.selected-card').forEach(c => c.classList.remove('selected-card'));
  updateBulkBar();
}
async function bulkDelete() {
  if (!confirm(`Delete ${selectedVariants.size} creative(s)? This cannot be undone.`)) return;
  const ids = Array.from(selectedVariants);
  const res = await apiCall('/api/creatives/bulk-delete', { method: 'POST', body: JSON.stringify({ variant_ids: ids }) });
  if (res.success) { showToast(`Deleted ${res.deleted} creative(s)`); selectedVariants.clear(); updateBulkBar(); loadAll(); }
  else showToast('Delete failed: ' + (res.error||''));
}
async function deleteAllUnapproved() {
  if (!confirm('Delete ALL unapproved creatives for this client?\n\nApproved creatives will be kept.\nThis cannot be undone.')) return;
  const res = await apiCall(`/api/clients/${clientId}/creatives/delete-unapproved`, { method: 'POST' });
  if (res.success) { showToast(`Deleted ${res.deleted} unapproved creative(s)`); selectedVariants.clear(); updateBulkBar(); loadAll(); }
  else showToast('Delete failed: ' + (res.error||''));
}
async function deleteVariant(vid) {
  if (!confirm('Delete this creative?')) return;
  const res = await apiCall(`/api/creatives/${vid}`, { method: 'DELETE' });
  if (res.success) { showToast('Deleted'); loadAll(); }
  else showToast('Delete failed');
}

// ── Media rendering ──

function renderMedia(mp, vid) {
  if (!mp) return '';
  const imgs = (mp.selected_images || []).filter(Boolean);
  const hero = mp.hero_image;
  const vids = (mp.videos || []).filter(Boolean);
  const all = hero && !imgs.includes(hero) ? [hero, ...imgs] : imgs;
  if (!all.length && !vids.length) return '<div style="padding:12px;color:var(--text2);font-size:12px">No media available</div>';
  let h = '<div class="media-strip">';
  for (const img of all.slice(0,5)) {
    h += `<img src="${esc(img)}" alt="" onclick="openLightbox('${esc(img)}')" loading="lazy" onerror="this.outerHTML='<div class=\\'media-placeholder\\'>Image unavailable</div>'">`;
  }
  for (const v of vids.slice(0,2)) {
    h += `<div class="media-placeholder" onclick="window.open('${esc(v)}','_blank')" style="cursor:pointer;background:var(--surface2)">
      <div style="text-align:center"><div style="font-size:24px">&#9654;</div><div style="font-size:10px;margin-top:2px">Video</div></div>
    </div>`;
  }
  if (all.length + vids.length > 7) h += `<div class="media-placeholder">+${all.length + vids.length - 7}</div>`;
  return h + '</div>';
}

function renderMediaGrid(mp, vid) {
  if (!mp) return '';
  const allImgs = (mp.gallery || []).filter(Boolean);
  const allVids = (mp.videos || []).filter(Boolean);
  if (allImgs.length + allVids.length === 0) return '<div style="padding:12px;color:var(--text2);font-size:12px">No media available</div>';
  const selectedImgs = new Set((mp.selected_images || []).filter(Boolean));
  const selectedVid = mp.selected_video;

  let h = `<details open style="margin-top:8px"><summary style="font-size:12px;color:var(--text2);cursor:pointer;user-select:none">Edit media (${allImgs.length} images, ${allVids.length} videos)</summary>`;
  h += `<div class="media-grid" id="mgrid-${vid}">`;
  let mediaIdx = 0;
  for (const img of allImgs) {
    const sel = selectedImgs.has(img);
    const idx = mediaIdx++;
    h += `<div class="media-grid-item ${sel?'selected':''}" onclick="toggleMediaItem(this,'${vid}','image','${esc(img)}')">
      <img src="${esc(img)}" loading="lazy" onerror="this.parentElement.remove()">
      <button class="media-view-btn" onclick="event.stopPropagation();openGallery('${vid}',${idx})" title="View full size">&#128065;</button>
    </div>`;
  }
  for (const v of allVids) {
    const sel = v === selectedVid;
    const idx = mediaIdx++;
    h += `<div class="media-grid-item ${sel?'selected':''}" onclick="toggleMediaItem(this,'${vid}','video','${esc(v)}')">
      <div style="width:100%;height:100%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px">&#9654;</div>
      <span class="vid-badge">MP4</span>
      <button class="media-view-btn" onclick="event.stopPropagation();openGallery('${vid}',${idx})" title="View video">&#128065;</button>
    </div>`;
  }
  h += `</div><button class="btn btn-sm" style="margin-top:6px" onclick="saveMediaSelection('${vid}')">Update Media</button></details>`;
  return h;
}

function toggleMediaItem(el, vid, type, url) {
  el.classList.toggle('selected');
}

async function saveMediaSelection(vid) {
  const grid = document.getElementById('mgrid-' + vid);
  if (!grid) return;
  const v = window._variants?.[vid];
  if (!v) return;
  const mp = { ...v.media_plan_json };
  const selectedEls = grid.querySelectorAll('.media-grid-item.selected');
  const newImages = [];
  let newVideo = null;
  selectedEls.forEach(el => {
    const img = el.querySelector('img');
    const badge = el.querySelector('.vid-badge');
    if (badge) { newVideo = el.onclick.toString().match(/'([^']+)'\)$/)?.[1] || mp.selected_video; }
    else if (img) newImages.push(img.src);
  });
  mp.selected_images = newImages;
  mp.selected_video = newVideo;
  mp.hero_image = newImages[0] || mp.hero_image;

  const res = await apiCall(`/api/creatives/${vid}`, { method: 'PUT', body: JSON.stringify({ media_plan_json: mp }) });
  if (res.success) { showToast('Media updated'); v.media_plan_json = mp; }
  else showToast('Update failed');
}

function renderStoryboard(timeline) {
  if (!timeline || !timeline.scenes) return '';
  let h = '<div style="margin-top:12px"><div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600">REEL STORYBOARD (' + timeline.total_duration_sec + 's)</div><div class="storyboard">';
  for (const s of timeline.scenes) {
    const src = s.source || '';
    const isVid = src.includes('video') || src.includes('.mp4');
    h += `<div class="storyboard-scene">
      ${src ? (isVid ? `<div style="width:100%;height:56px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px">&#9654;</div>` : `<img src="${esc(src)}" onerror="this.outerHTML='<div style=\\'width:100%;height:56px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:10px\\'>No media</div>'">`) : '<div style="width:100%;height:56px;background:var(--surface2)"></div>'}
      <div class="scene-info">
        <div class="scene-time">${s.start_sec}s-${s.start_sec+s.duration_sec}s</div>
        <div class="scene-text">${esc(s.overlay_text||'')}</div>
      </div>
    </div>`;
  }
  return h + '</div></div>';
}

// ── Save edited copy ──

async function saveCopy(variantId, platform) {
  const textEl = document.getElementById('text-' + variantId);
  const hlEl = document.getElementById('hl-' + variantId);
  const descEl = document.getElementById('desc-' + variantId);
  const urlEl = document.getElementById('url-' + variantId);
  const ctaEl = document.getElementById('cta-' + variantId);
  const tagsEl = document.getElementById('tags-' + variantId);
  const newText = textEl?.innerText || '';
  const newHeadline = hlEl?.value || '';
  const newDesc = descEl?.value || '';
  const newUrl = urlEl?.value?.trim() || '';
  const newCta = ctaEl?.value?.trim() || '';
  const newTags = (tagsEl?.value || '').split(/\s+/).filter(t => t.startsWith('#') || t.length > 0).map(t => t.startsWith('#') ? t : '#' + t).filter(Boolean);
  const v = window._variants?.[variantId];
  if (!v) return;
  const copy = { ...v.copy_json };

  if (platform === 'facebook') { copy.primary_text = newText; if (newHeadline) copy.headline = newHeadline; if (newDesc) copy.description = newDesc; }
  else if (platform === 'instagram') { copy.caption = newText; }
  else if (platform === 'tiktok') { const parts = newText.split('\n\n'); copy.hook = parts[0] || copy.hook; copy.voiceover_script = parts.slice(1).join('\n\n') || copy.voiceover_script; }
  copy.ad_url = newUrl;
  if (newCta) { copy.cta = newCta; if (platform === 'tiktok') copy.closing_cta = newCta; }
  if (tagsEl) copy.hashtags = newTags.length > 0 ? newTags : undefined;

  const res = await apiCall(`/api/creatives/${variantId}`, { method: 'PUT', body: JSON.stringify({ copy_json: copy }) });
  if (res.success) { showToast('Creative saved'); window._variants[variantId].copy_json = copy; }
  else showToast('Save failed: ' + (res.error || ''));
}

// ── Preview popup ──

function openPreview(variantId, platform) {
  const v = window._variants?.[variantId];
  if (!v) return;
  const media = v.media_plan_json || {};
  const heroImg = media.hero_image || (media.selected_images||[]).filter(Boolean)[0] || '';
  const lang = v.copy_json?.language || 'en';

  const entityId = v.batch?.entity_id || v.entity?.id;
  const allVariants = {};
  Object.values(window._variants || {}).forEach(vr => {
    if ((vr.batch?.entity_id || vr.entity?.id) === entityId && vr.copy_json?.language === lang) allVariants[vr.platform] = vr;
  });

  // Read current edited text + URL from input fields
  const copy = { ...v.copy_json };
  const textEl = document.getElementById('text-' + variantId);
  const hlEl = document.getElementById('hl-' + variantId);
  const urlEl = document.getElementById('url-' + variantId);
  if (textEl) {
    const t = textEl.innerText;
    if (platform === 'facebook') copy.primary_text = t;
    else if (platform === 'instagram') copy.caption = t;
    else if (platform === 'tiktok') { const p = t.split('\n\n'); copy.hook = p[0]; copy.voiceover_script = p.slice(1).join('\n\n'); }
  }
  if (hlEl && platform === 'facebook') copy.headline = hlEl.value;
  const adUrl = urlEl?.value?.trim() || v.entity?.listing_url || '';
  allVariants[platform] = { ...v, copy_json: copy };

  const fbV = allVariants.facebook; const igV = allVariants.instagram; const tkV = allVariants.tiktok;
  const fbCopy = fbV?.copy_json || buildFBFromCopy(copy);
  const igCopy = igV?.copy_json || buildIGFromCopy(copy);
  const tkCopy = tkV?.copy_json || buildTKFromCopy(copy);
  const fbMedia = fbV?.media_plan_json || media;
  const igMedia = igV?.media_plan_json || media;
  const tkMedia = tkV?.media_plan_json || media;

  const overlay = document.createElement('div');
  overlay.className = 'preview-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="preview-popup" style="max-width:500px">
    <button class="preview-popup-close" onclick="this.closest('.preview-overlay').remove()">&times;</button>
    <div class="preview-popup-header">Ad Preview · ${lang==='he'?'Hebrew':'English'}</div>
    <div style="padding:0 16px">
      <div style="display:flex;gap:4px;margin:12px 0;background:var(--surface2);border-radius:8px;padding:3px">
        <button class="prev-tab ${platform==='facebook'?'active':''}" data-p="facebook" onclick="switchPreviewTab(this,'facebook')"><span style="color:#1877f2">&#9679;</span> Facebook</button>
        <button class="prev-tab ${platform==='instagram'?'active':''}" data-p="instagram" onclick="switchPreviewTab(this,'instagram')"><span style="color:#e4405f">&#9679;</span> Instagram</button>
        <button class="prev-tab ${platform==='tiktok'?'active':''}" data-p="tiktok" onclick="switchPreviewTab(this,'tiktok')"><span style="color:#fff">&#9679;</span> TikTok</button>
      </div>
    </div>
    <div style="padding:0 16px 16px">
      <div class="prev-panel" data-p="facebook" style="display:${platform==='facebook'?'block':'none'}">${previewFB(fbCopy, fbMedia, adUrl)}</div>
      <div class="prev-panel" data-p="instagram" style="display:${platform==='instagram'?'block':'none'}">${previewIG(igCopy, igMedia, adUrl)}</div>
      <div class="prev-panel" data-p="tiktok" style="display:${platform==='tiktok'?'block':'none'}">${previewTK(tkCopy, tkMedia, adUrl)}</div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function switchPreviewTab(btn, platform) {
  const popup = btn.closest('.preview-popup');
  popup.querySelectorAll('.prev-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  popup.querySelectorAll('.prev-panel').forEach(p => p.style.display = p.dataset.p === platform ? 'block' : 'none');
}

function buildFBFromCopy(c) { return { primary_text: c.primary_text||c.caption||c.voiceover_script||'', headline: c.headline||'', description: c.description||'', cta: c.cta||'Learn More', language: c.language }; }
function buildIGFromCopy(c) { return { caption: c.caption||c.primary_text||c.voiceover_script||'', hashtags: c.hashtags||[], cta: c.cta||'Link in Bio', language: c.language }; }
function buildTKFromCopy(c) { return { hook: c.hook||(c.primary_text||'').split('\n')[0]||'', voiceover_script: c.voiceover_script||c.primary_text||c.caption||'', closing_cta: c.closing_cta||c.cta||'Learn More', on_screen_text: c.on_screen_text||[], language: c.language }; }

function driveVideoEmbed(url) {
  // Extract file ID from Drive URL and return embeddable preview URL
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return url;
}

function videoPlayer(url, aspectRatio, autoplay) {
  const embed = driveVideoEmbed(url);
  const isDrive = url.includes('drive.google.com');
  if (isDrive) {
    return `<iframe src="${esc(embed)}${autoplay?'?autoplay=1':''}" style="width:100%;aspect-ratio:${aspectRatio};border:none;border-radius:4px" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  }
  return `<video src="${esc(url)}" style="width:100%;aspect-ratio:${aspectRatio};object-fit:cover;border-radius:4px" controls ${autoplay?'autoplay muted':''}></video>`;
}

function previewFB(c, media, listingUrl) {
  const imgs = (media.selected_images||[]).filter(Boolean);
  const hero = media.hero_image || imgs[0] || '';
  const vid = (media.videos||[])[0];
  const hasVideo = !!vid;
  const url = listingUrl || '';
  const domain = url ? new URL(url).hostname.replace('www.','') : '';
  let mediaHtml = '';
  if (hasVideo) {
    mediaHtml = videoPlayer(vid, '1.91/1', false);
  } else if (imgs.length > 1) {
    mediaHtml = `<div class="fb-carousel">${imgs.slice(0,5).map(i=>`<img src="${esc(i)}" style="width:100%" onerror="this.remove()">`).join('')}</div>`;
  } else if (hero) {
    mediaHtml = `<img class="fb-image" src="${esc(hero)}" onerror="this.style.display='none'">`;
  }
  const linkClick = url ? `onclick="window.open('${esc(url)}','_blank')" style="cursor:pointer"` : '';
  return `<div class="fb-card">
    <div class="fb-header"><div class="fb-avatar">RE</div><div><div class="fb-name">Real Estate Marketing</div><div class="fb-meta">Sponsored</div></div></div>
    <div class="fb-text">${esc(c.primary_text||'')}</div>
    ${mediaHtml}
    <div class="fb-link-bar" ${linkClick}><div class="fb-link-domain">${esc(domain)}</div><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="fb-link-title">${esc(c.headline||'')}</div><div class="fb-link-desc">${esc(c.description||'')}</div></div><button class="fb-cta-btn">${esc(c.cta||'Learn More')}</button></div></div>
    <div class="fb-actions"><div class="fb-action">&#128077; Like</div><div class="fb-action">&#128172; Comment</div><div class="fb-action">&#8599; Share</div></div>
  </div>`;
}

function previewIG(c, media, listingUrl) {
  const imgs = (media.selected_images||[]).filter(Boolean);
  const hero = media.hero_image || imgs[0] || '';
  const vids = (media.videos||[]).filter(Boolean);
  const isReel = vids.length > 0 || c.ad_type === 'reel';
  const isCarousel = !isReel && imgs.length > 1;

  let mediaHtml = '';
  if (isReel && vids.length > 0) {
    mediaHtml = `<div style="position:relative">
      ${videoPlayer(vids[0], '1/1', false)}
      <div style="position:absolute;top:12px;left:12px;background:rgba(0,0,0,.6);padding:3px 10px;border-radius:4px;font-size:11px;color:#fff;font-weight:600;z-index:2">Reel</div>
    </div>`;
  } else if (isReel) {
    mediaHtml = `<div style="position:relative">${hero?`<img class="ig-image" src="${esc(hero)}" onerror="this.style.background='#262626'">`:'<div class="ig-image" style="background:#262626"></div>'}
      <div style="position:absolute;top:12px;left:12px;background:rgba(0,0,0,.5);padding:3px 8px;border-radius:4px;font-size:11px;color:#fff">Reel</div></div>`;
  } else if (isCarousel) {
    mediaHtml = `<div class="ig-carousel"><div class="ig-carousel-inner" id="ig-carousel-inner">${imgs.slice(0,5).map(i=>`<img src="${esc(i)}" onerror="this.remove()">`).join('')}</div></div>
      <div class="ig-dots">${imgs.slice(0,5).map((_,i)=>`<span class="ig-dot ${i===0?'active':''}"></span>`).join('')}</div>`;
  } else {
    mediaHtml = hero ? `<img class="ig-image" src="${esc(hero)}" onerror="this.style.background='#262626'">` : '<div class="ig-image" style="background:#262626"></div>';
  }

  return `<div class="ig-card">
    <div class="ig-header"><div class="ig-avatar">RE</div><div style="flex:1"><div class="ig-name">realestate.marketing</div><div class="ig-sponsored">Sponsored</div></div><span style="color:#a8a8a8;font-size:18px">&bull;&bull;&bull;</span></div>
    ${mediaHtml}
    <div class="ig-actions-bar">
      <svg class="ig-action-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <svg class="ig-action-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <svg class="ig-action-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      <div style="flex:1"></div>
      <svg class="ig-action-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="ig-caption"><span class="cname">realestate.marketing</span> ${esc(c.caption||'')}
      ${c.hashtags?`<div class="ig-hashtags">${c.hashtags.join(' ')}</div>`:''}
    </div>
    ${c.cta?`<div class="ig-cta-bar" ${listingUrl?`onclick="window.open('${esc(listingUrl)}','_blank')" style="cursor:pointer"`:''}>${esc(c.cta)}</div>`:''}
  </div>`;
}

function previewTK(c, media, listingUrl) {
  const hero = media.hero_image || (media.selected_images||[]).filter(Boolean)[0] || '';
  const vid = (media.videos||[])[0];
  const timeline = media.reel_timeline;
  let bgHtml = '';
  if (vid) {
    // Embed video as TikTok background
    const embed = driveVideoEmbed(vid);
    const isDrive = vid.includes('drive.google.com');
    if (isDrive) {
      bgHtml = `<iframe src="${esc(embed)}?autoplay=1" style="width:100%;height:100%;border:none;position:absolute;inset:0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
    } else {
      bgHtml = `<video src="${esc(vid)}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" autoplay muted loop></video>`;
    }
  } else if (hero) {
    bgHtml = `<img src="${esc(hero)}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;filter:brightness(.7)" onerror="this.style.background='#111'">`;
  } else {
    bgHtml = '<div style="width:100%;height:100%;background:#111;position:absolute;inset:0"></div>';
  }
  return `<div class="tk-card" style="overflow:hidden">
    <div class="tk-bg">${bgHtml}</div>
    ${!vid?'':'<div style="position:absolute;inset:0;background:rgba(0,0,0,.25);z-index:0"></div>'}
    <div class="tk-sponsored">Sponsored</div>
    <div class="tk-hook">${esc(c.hook||'')}</div>
    <div class="tk-right">
      <div class="tk-right-btn"><div class="tk-right-icon">&#10084;</div>24.5K</div>
      <div class="tk-right-btn"><div class="tk-right-icon">&#128172;</div>482</div>
      <div class="tk-right-btn"><div class="tk-right-icon">&#8599;</div>Share</div>
    </div>
    <div class="tk-overlay"><div>
      <div class="tk-name">@realestate.mkt</div>
      <div class="tk-desc">${esc(c.voiceover_script||c.on_screen_text?.join(' · ')||'')}</div>
      <div class="tk-cta" ${listingUrl?`onclick="window.open('${esc(listingUrl)}','_blank')" style="cursor:pointer"`:''}>${esc(c.closing_cta||c.cta||'Learn More')}</div>
    </div></div>
  </div>
  ${timeline ? renderStoryboard(timeline) : ''}`;
}

// ── Approvals ──

async function renderApprovals(el) {
  const allTasks = await apiCall(`/api/clients/${clientId}/approvals`);
  const tasks = allTasks.filter(t => t.status === 'approved' || t.status === 'approved_with_edits');
  if (!tasks.length) { el.innerHTML = '<div class="empty-state"><h3>No approved ads yet</h3><p>Approve creatives in the Creatives tab first.</p></div>'; return; }
  el.innerHTML = `<div class="card-grid">${tasks.map(t=>{
    const v=t.variant||{};const copy=v.copy_json||{};const media=v.media_plan_json||{};
    const platform = v.platform || 'facebook';
    let preview = '';
    if (platform === 'facebook') preview = previewFB(copy, media);
    else if (platform === 'instagram') preview = previewIG(copy, media);
    else if (platform === 'tiktok') preview = previewTK(copy, media);
    return `<div class="card">
      <div class="card-header">
        <div><h3>${t.entity?.title_he||t.entity?.title_en||'-'}</h3>
        <div style="color:var(--text2);font-size:12px;margin-top:4px">
          <span class="platform-tag platform-${platform}">${platform}</span>
          <span style="margin-left:6px">${copy.language==='he'?'Hebrew':'English'} · V#${v.variant_no||1}</span>
        </div></div>
        <span class="badge badge-green">Approved</span>
      </div>
      <div class="card-body" style="padding:12px">${preview}</div>
      ${t.decision_notes?`<div style="padding:8px 20px 12px;font-size:13px;color:var(--text2)">Notes: ${esc(t.decision_notes)}</div>`:''}
      <div class="card-footer">
        ${platform==='facebook'?`<button class="btn btn-sm" style="background:#1877f2;border-color:#1877f2;color:#fff" onclick="publishTo('facebook','${v.id}')">Publish to Facebook</button>`:''}
        ${platform==='instagram'?`<button class="btn btn-sm" style="background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);border:none;color:#fff" onclick="publishTo('instagram','${v.id}')">Publish to Instagram</button>`:''}
        ${platform==='tiktok'?`<button class="btn btn-sm" style="background:#000;border-color:#333;color:#fff" onclick="publishTo('tiktok','${v.id}')">Publish to TikTok</button>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── Properties ──

async function renderProperties(el) {
  const entities = await apiCall(`/api/clients/${clientId}/entities`);
  if (!entities.length) { el.innerHTML = '<div class="empty-state"><h3>No properties</h3><p>Sync from the API to import properties.</p></div>'; return; }
  el.innerHTML = `<div class="card-grid">${entities.map(e=>{
    const s=e.snapshot||{};
    const heroImg = s.hero_image || (s.gallery && s.gallery[0]) || '';
    return `<div class="card">${heroImg?`<img class="card-cover" src="${esc(heroImg)}" onerror="this.style.display='none'" loading="lazy">`:''}<div class="card-header"><div><h3>${s.title_he||s.title_en||e.source_entity_id}</h3><div style="color:var(--text2);font-size:12px;margin-top:4px">${e.entity_type} · ${e.source_entity_id}</div></div><span class="badge ${e.campaign_ready?'badge-green':'badge-yellow'}">${e.campaign_ready?'Ready':'Not Ready'}</span></div><div class="card-body"><div class="detail-row"><span class="label">Location</span><span>${s.city||'-'}${s.area?', '+s.area:''}</span></div><div class="detail-row"><span class="label">Price</span><span>${s.price_text||(s.price_currency?s.price_currency+' '+Number(s.price_amount).toLocaleString():'-')}</span></div><div class="detail-row"><span class="label">Media</span><span>${s.gallery_count||0} images · ${s.video_count||0} videos</span></div></div></div>`;
  }).join('')}</div>`;
}

// ── Actions ──

async function syncDrive() {
  showToast('Syncing Drive...');
  const r = await apiCall(`/api/clients/${clientId}/drive/sync`, { method: 'POST', body: '{}' });
  if (r.success) showToast(`Drive: ${r.result.images} images, ${r.result.videos} videos`);
  else showToast('Drive sync failed');
  loadAll();
}
async function syncClient() {
  showToast('Syncing & creating...');
  const r = await apiCall(`/api/clients/${clientId}/sync`, { method: 'POST', body: JSON.stringify({ run_pipeline: true }) });
  if (r.success) { const p = r.result; showToast(`Synced: ${p.properties_fetched||0} props, ${p.drive_files_synced||0} Drive files, ${p.pipeline?.variants||0} creatives`); }
  else showToast('Sync failed: '+(r.error||''));
  loadAll();
}
async function runPipeline() {
  showToast('Running pipeline...');
  const r = await apiCall(`/api/clients/${clientId}/pipeline`, { method: 'POST', body: JSON.stringify({}) });
  if (r.success) showToast(`Pipeline: ${r.result.selected} selected, ${r.result.variants} creatives`);
  loadAll();
}
async function generateFor(candidateId) {
  showToast('Generating...');
  const r = await apiCall('/api/creatives/generate', { method: 'POST', body: JSON.stringify({ candidate_id: candidateId }) });
  if (r.success) { showToast(`Generated ${r.variants.length} variants`); switchTab('creatives'); }
  loadAll();
}
async function publishTo(platform, variantId) {
  if (!confirm(`Publish this ad to ${platform}?`)) return;
  showToast(`Publishing to ${platform}...`);
  const res = await apiCall(`/api/publish/${platform}/${variantId}`, { method: 'POST', body: '{}' });
  if (res.success) showToast(`Published to ${platform}! Post ID: ${res.post_id}`);
  else showToast(`Publish failed: ${res.error || 'Check connection'}`);
}
async function approve(taskId, status) {
  const notes = status === 'rejected' ? prompt('Rejection reason:') : null;
  await apiCall(`/api/approvals/${taskId}`, { method: 'PUT', body: JSON.stringify({ status, decision_notes: notes }) });
  showToast(`Creative ${status}`);
  loadAll();
}

// ── Helpers ──

// Gallery viewer with left/right navigation
let _galleryItems = [];
let _galleryIdx = 0;

function openGallery(vid, startIdx) {
  const v = window._variants?.[vid];
  if (!v) return;
  const mp = v.media_plan_json || {};
  const imgs = (mp.gallery || []).filter(Boolean);
  const vids = (mp.videos || []).filter(Boolean);
  _galleryItems = [
    ...imgs.map(u => ({ type: 'image', url: u })),
    ...vids.map(u => ({ type: 'video', url: u })),
  ];
  if (_galleryItems.length === 0) return;
  _galleryIdx = Math.min(startIdx || 0, _galleryItems.length - 1);
  renderGallery();
}

function openLightbox(src) {
  _galleryItems = [{ type: 'image', url: src }];
  _galleryIdx = 0;
  renderGallery();
}

function renderGallery() {
  closeGallery();
  const item = _galleryItems[_galleryIdx];
  if (!item) return;
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.id = 'gallery-overlay';
  lb.onclick = (e) => { if (e.target === lb) closeGallery(); };

  const counter = _galleryItems.length > 1 ? `<span class="gallery-counter">${_galleryIdx + 1} / ${_galleryItems.length}</span>` : '';
  const prevBtn = _galleryItems.length > 1 ? `<button class="gallery-nav gallery-prev" onclick="event.stopPropagation();galleryNav(-1)">&#10094;</button>` : '';
  const nextBtn = _galleryItems.length > 1 ? `<button class="gallery-nav gallery-next" onclick="event.stopPropagation();galleryNav(1)">&#10095;</button>` : '';

  let content;
  if (item.type === 'video') {
    content = `<video src="${esc(item.url)}" controls autoplay style="max-width:90vw;max-height:80vh;border-radius:8px"></video>`;
  } else {
    content = `<img src="${esc(item.url)}" style="max-width:90vw;max-height:80vh;border-radius:8px">`;
  }

  lb.innerHTML = `
    <button class="lightbox-close" onclick="closeGallery()">&#10005;</button>
    ${prevBtn}
    ${content}
    ${nextBtn}
    ${counter}
  `;
  document.body.appendChild(lb);
}

function galleryNav(dir) {
  _galleryIdx = (_galleryIdx + dir + _galleryItems.length) % _galleryItems.length;
  renderGallery();
}

function closeGallery() {
  document.getElementById('gallery-overlay')?.remove();
}

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('gallery-overlay')) return;
  if (e.key === 'ArrowLeft') galleryNav(-1);
  else if (e.key === 'ArrowRight') galleryNav(1);
  else if (e.key === 'Escape') closeGallery();
});
function esc(s) { return escapeHtml(s); }

init();
</script>
