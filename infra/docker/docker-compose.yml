version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agents_studio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agents_studio"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.orchestrator
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://user:password@postgres:5432/agents_studio
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dashboard
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
    depends_on:
      - orchestrator

volumes:
  pgdata:
