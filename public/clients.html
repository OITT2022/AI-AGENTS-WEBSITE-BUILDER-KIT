<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/dashboard/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/dashboard/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/dashboard/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/dashboard/apple-touch-icon.png">
  <title>Clients - Marketing Agent</title>
  <style>
    :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3345;--text:#e4e6f0;--text2:#9da3b7;--primary:#6366f1;--primary-hover:#818cf8;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--radius:12px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header h1{font-size:20px;font-weight:700}
    .btn{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
    .btn:hover{background:var(--border)}
    .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
    .btn-sm{padding:6px 12px;font-size:12px}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .badge-green{background:rgba(34,197,94,.15);color:var(--green)}.badge-yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
    .container{padding:28px 32px;max-width:1200px;margin:0 auto}
    .clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
    .client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s;cursor:pointer}
    .client-card:hover{border-color:var(--primary)}
    .client-card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
    .client-card-header h3{font-size:16px;font-weight:600}
    .client-card-header .company{color:var(--text2);font-size:13px;margin-top:3px}
    .client-card-body{padding:16px 22px}
    .client-card-footer{padding:12px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
    .detail-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}.detail-row .label{color:var(--text2)}
    .config-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(99,102,241,.1);color:var(--primary)}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text2)}.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text)}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--green);color:var(--text);padding:14px 24px;border-radius:var(--radius);font-size:14px;z-index:1000;animation:slideIn .3s ease}
    @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    @media(max-width:768px){.container{padding:16px}.clients-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="header">
  <h1>Clients</h1>
  <a class="btn btn-primary" href="/dashboard/client-form.html" style="text-decoration:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Client
  </a>
</div>

<div class="container">
  <div id="clients-content"><div class="empty-state"><h3>Loading...</h3></div></div>
</div>

<script src="/dashboard/shared.js"></script>
<script>
async function init() {
  await requireLogin();
  injectNav('clients');
  loadClients();
}

async function loadClients() {
  const clients = await apiCall('/api/clients');
  if (!Array.isArray(clients) || clients.length === 0) {
    document.getElementById('clients-content').innerHTML = '<div class="empty-state"><h3>No clients yet</h3><p>Add your first client to start managing campaigns.</p></div>';
    return;
  }

  renderClientCards(clients);

  // Lazy-load stats
  for (const c of clients) {
    try {
      const stats = await apiCall(`/api/clients/${c.id}/dashboard`);
      const el = document.getElementById(`client-stats-${c.id}`);
      if (el) el.innerHTML = `
        <div class="detail-row"><span class="label">Properties</span><span>${stats.total_entities || 0} (${stats.campaign_ready || 0} ready)</span></div>
        <div class="detail-row"><span class="label">Creatives</span><span>${stats.total_variants || 0}</span></div>
        <div class="detail-row"><span class="label">Pending Approval</span><span style="color:${stats.approvals_pending > 0 ? 'var(--yellow)' : 'var(--text2)'}">${stats.approvals_pending || 0}</span></div>
      `;
    } catch {}
  }
}

function renderClientCards(clients) {
  document.getElementById('clients-content').innerHTML = `<div class="clients-grid">${clients.map(c => `
    <div class="client-card" onclick="window.location.href='/dashboard/campaign.html?client=${c.id}'">
      <div class="client-card-header">
        <div>
          <h3>${escapeHtml(c.company)}</h3>
          <div class="company">${escapeHtml(c.name)} ${c.email ? '· ' + escapeHtml(c.email) : ''}</div>
        </div>
        <span class="badge ${c.active ? 'badge-green' : 'badge-yellow'}">${c.active ? 'Active' : 'Inactive'}</span>
      </div>
      <div class="client-card-body">
        <div id="client-stats-${c.id}" style="min-height:60px">
          <div style="color:var(--text2);font-size:12px">Loading stats...</div>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px">
          ${c.api_config?.api_token ? '<span class="config-badge">API Connected</span>' : ''}
          ${c.google_drive_folder_id || c.google_drive_folder_url ? '<span class="config-badge">Google Drive</span>' : ''}
        </div>
      </div>
      <div class="client-card-footer" onclick="event.stopPropagation()">
        <button class="btn btn-sm" style="color:var(--red);border-color:rgba(239,68,68,.3)" onclick="confirmDeleteClient('${c.id}','${escapeHtml(c.company)}')">Delete</button>
        <div style="flex:1"></div>
        <a class="btn btn-sm" href="/dashboard/client-form.html?id=${c.id}" style="text-decoration:none">Edit</a>
        ${(c.api_config?.api_token || c.google_drive_folder_id) ? `<button class="btn btn-sm btn-primary" onclick="syncClient('${c.id}')">Sync & Create</button>` : ''}
      </div>
    </div>
  `).join('')}</div>`;
}

function confirmDeleteClient(id, name) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;max-width:440px;width:90%">
      <h3 style="font-size:17px;margin-bottom:12px">Delete Client</h3>
      <p style="color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:8px">
        Are you sure you want to delete <strong style="color:var(--text)">${name}</strong>?
      </p>
      <p style="color:var(--red);font-size:13px;margin-bottom:20px">
        This will permanently delete all properties, creatives, candidates, approvals, and campaign data associated with this client.
      </p>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn" onclick="this.closest('div[style*=fixed]').remove()">Cancel</button>
        <button class="btn" style="background:var(--red);border-color:var(--red);color:#fff" onclick="deleteClient('${id}');this.closest('div[style*=fixed]').remove()">Delete Client & All Data</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

async function deleteClient(id) {
  showToast('Deleting client and all data...');
  try {
    const res = await apiCall(`/api/clients/${id}`, { method: 'DELETE' });
    if (res.success) {
      showToast('Client and all related data deleted');
      loadClients();
    } else {
      showToast('Delete failed: ' + (res.error || ''));
    }
  } catch { showToast('Delete error'); }
}

async function syncClient(id) {
  showToast('Syncing API + Drive & generating creatives...');
  try {
    const result = await apiCall(`/api/clients/${id}/sync`, { method: 'POST', body: JSON.stringify({ run_pipeline: true }) });
    if (result.success) {
      const r = result.result || {};
      const parts = [];
      if (r.properties_fetched) parts.push(r.properties_fetched + ' properties');
      if (r.drive_files_synced) parts.push(r.drive_files_synced + ' Drive files');
      if (r.pipeline?.variants) parts.push(r.pipeline.variants + ' ad variants created');
      showToast(parts.length > 0 ? 'Synced: ' + parts.join(', ') : 'Sync complete');
      loadClients();
    } else {
      showToast('Sync failed: ' + (result.error || 'Unknown error'));
    }
  } catch (e) { showToast('Sync error'); }
}

init();
</script>
</body>
</html>
