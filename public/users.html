<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/dashboard/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/dashboard/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/dashboard/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/dashboard/apple-touch-icon.png">
  <title>Users Management - Marketing Agent</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3345;
      --text: #e4e6f0;
      --text2: #9da3b7;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .back-link { color: var(--text2); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
    .back-link:hover { color: var(--text); }

    .container { padding: 32px; max-width: 1000px; margin: 0 auto; }

    .btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { background: var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-green { background: var(--green); border-color: var(--green); color: white; }
    .btn-red { background: var(--red); border-color: var(--red); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-purple { background: rgba(99,102,241,0.15); color: var(--primary); }

    /* Table */
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .table-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-header h2 { font-size: 16px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); border-bottom: 1px solid var(--border); background: var(--surface2); }
    td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(99,102,241,0.03); }

    .user-info { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; flex-shrink: 0; }
    .user-name { font-weight: 600; }
    .user-email { font-size: 12px; color: var(--text2); }

    .actions-cell { display: flex; gap: 6px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 480px; padding: 0; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 17px; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 0 4px; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    input, select { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.15s; }
    input:focus, select:focus { outline: none; border-color: var(--primary); }

    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--green); color: var(--text); padding: 14px 24px; border-radius: var(--radius); font-size: 14px; z-index: 1000; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .header { padding: 12px 16px; }
      .form-row { grid-template-columns: 1fr; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Users Management
  </h1>
  <div class="header-actions">
    <a class="back-link" href="/dashboard">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Dashboard
    </a>
  </div>
</div>

<div class="container">
  <div class="table-card">
    <div class="table-header">
      <h2>All Users</h2>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add User
      </button>
    </div>
    <div id="users-table"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add User</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="error-msg" id="modal-error" style="display:none"></div>
      <form id="user-form" onsubmit="handleSubmit(event)">
        <input type="hidden" id="form-id">
        <div class="form-row">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="form-name" placeholder="Full name" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="form-email" placeholder="user@example.com" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label id="password-label">Password</label>
            <input type="password" id="form-password" placeholder="Minimum 6 characters" minlength="6">
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="form-role">
              <option value="viewer">Viewer</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="handleSubmit()" id="modal-submit">Add User</button>
    </div>
  </div>
</div>

<script src="/dashboard/shared.js"></script>
<script>
const API = window.location.origin;
let currentUser = null;

function getAuthHeaders() {
  const token = localStorage.getItem('auth_token');
  return token ? { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    credentials: 'include',
    headers: getAuthHeaders(),
    ...opts,
  });
  if (res.status === 401) {
    window.location.href = '/dashboard/login.html';
    throw new Error('Not authenticated');
  }
  if (res.status === 403) {
    showToast('Access denied — admin role required');
    throw new Error('Forbidden');
  }
  return res.json();
}

async function checkAuth() {
  try {
    const data = await api('/api/auth/me');
    currentUser = data.user;
    if (currentUser.role !== 'admin') {
      document.querySelector('.container').innerHTML = '<div class="empty-state"><h3>Access Denied</h3><p>Only administrators can manage users.</p></div>';
      return false;
    }
    return true;
  } catch {
    window.location.href = '/dashboard/login.html';
    return false;
  }
}

async function loadUsers() {
  const ok = await checkAuth();
  if (!ok) return;

  try {
    const users = await api('/api/users');
    renderTable(users);
  } catch {}
}

function renderTable(users) {
  if (users.length === 0) {
    document.getElementById('users-table').innerHTML = '<div class="empty-state"><h3>No users</h3><p>Add your first user to get started.</p></div>';
    return;
  }

  const roleBadge = (role) => {
    switch(role) {
      case 'admin': return 'badge-red';
      case 'manager': return 'badge-blue';
      default: return 'badge-purple';
    }
  };

  document.getElementById('users-table').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Role</th>
          <th>Status</th>
          <th>Created</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td>
              <div class="user-info">
                <div class="avatar">${(u.name || u.email)[0].toUpperCase()}</div>
                <div>
                  <div class="user-name">${esc(u.name)}</div>
                  <div class="user-email">${esc(u.email)}</div>
                </div>
              </div>
            </td>
            <td><span class="badge ${roleBadge(u.role)}">${u.role}</span></td>
            <td><span class="badge ${u.active ? 'badge-green' : 'badge-yellow'}">${u.active ? 'Active' : 'Disabled'}</span></td>
            <td style="color:var(--text2);font-size:13px">${new Date(u.created_at).toLocaleDateString()}</td>
            <td>
              <div class="actions-cell" style="justify-content:flex-end">
                <button class="btn btn-sm" onclick='editUser(${JSON.stringify(u).replace(/'/g, "&#39;")})'>Edit</button>
                ${u.active
                  ? `<button class="btn btn-sm" onclick="toggleActive('${u.id}', false)">Disable</button>`
                  : `<button class="btn btn-sm btn-green" onclick="toggleActive('${u.id}', true)">Enable</button>`
                }
                ${u.id !== currentUser?.id ? `<button class="btn btn-sm btn-red" onclick="removeUser('${u.id}', '${esc(u.name)}')">Delete</button>` : ''}
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ── Modal ──

let editingId = null;

function openModal(user) {
  editingId = user?.id || null;
  document.getElementById('modal-title').textContent = editingId ? 'Edit User' : 'Add User';
  document.getElementById('modal-submit').textContent = editingId ? 'Save Changes' : 'Add User';
  document.getElementById('form-id').value = editingId || '';
  document.getElementById('form-name').value = user?.name || '';
  document.getElementById('form-email').value = user?.email || '';
  document.getElementById('form-password').value = '';
  document.getElementById('form-role').value = user?.role || 'viewer';
  document.getElementById('modal-error').style.display = 'none';

  const pwInput = document.getElementById('form-password');
  const pwLabel = document.getElementById('password-label');
  if (editingId) {
    pwInput.required = false;
    pwInput.placeholder = 'Leave blank to keep current';
    pwLabel.textContent = 'New Password (optional)';
  } else {
    pwInput.required = true;
    pwInput.placeholder = 'Minimum 6 characters';
    pwLabel.textContent = 'Password';
  }

  document.getElementById('modal').style.display = 'flex';
  document.getElementById('form-name').focus();
}

function editUser(user) { openModal(user); }

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editingId = null;
}

async function handleSubmit(e) {
  if (e) e.preventDefault();
  const errorEl = document.getElementById('modal-error');
  errorEl.style.display = 'none';

  const name = document.getElementById('form-name').value.trim();
  const email = document.getElementById('form-email').value.trim();
  const password = document.getElementById('form-password').value;
  const role = document.getElementById('form-role').value;

  if (!name || !email) {
    errorEl.textContent = 'Name and email are required';
    errorEl.style.display = 'block';
    return;
  }

  if (!editingId && (!password || password.length < 6)) {
    errorEl.textContent = 'Password must be at least 6 characters';
    errorEl.style.display = 'block';
    return;
  }

  try {
    if (editingId) {
      const body = { name, email, role };
      if (password) body.password = password;
      await api(`/api/users/${editingId}`, { method: 'PUT', body: JSON.stringify(body) });
      showToast('User updated');
    } else {
      await api('/api/users', { method: 'POST', body: JSON.stringify({ name, email, password, role }) });
      showToast('User created');
    }
    closeModal();
    loadUsers();
  } catch (err) {
    // Error might be from the api function's JSON parse
  }
}

async function toggleActive(id, active) {
  await api(`/api/users/${id}`, { method: 'PUT', body: JSON.stringify({ active }) });
  showToast(active ? 'User enabled' : 'User disabled');
  loadUsers();
}

async function removeUser(id, name) {
  if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
  await api(`/api/users/${id}`, { method: 'DELETE' });
  showToast('User deleted');
  loadUsers();
}

// ── Helpers ──

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// Close modal on backdrop click
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// Init
(async function() {
  await requireLogin();
  injectNav('users');
  loadUsers();
})();
</script>

</body>
</html>
