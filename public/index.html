<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/dashboard/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/dashboard/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/dashboard/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/dashboard/apple-touch-icon.png">
  <title>Real Estate Marketing Agent - Campaign Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242836;
      --border: #2e3345;
      --text: #e4e6f0;
      --text2: #9da3b7;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f97316;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
    }

    .btn:hover { background: var(--border); }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-green { background: var(--green); border-color: var(--green); color: white; }
    .btn-red { background: var(--red); border-color: var(--red); color: white; }

    .container { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .stat-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    .stat-card .label {
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.1;
    }

    .stat-card .sub {
      color: var(--text2);
      font-size: 12px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-card .trend-up { color: var(--green); }
    .stat-card .trend-down { color: var(--red); }

    .dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
    .dash-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .dash-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .dash-card h3 .card-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }

    .progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 6px; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

    .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .activity-text { font-size: 13px; line-height: 1.5; }
    .activity-time { font-size: 11px; color: var(--text2); }

    .client-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-radius: 8px; transition: background .15s; cursor: pointer; text-decoration: none; color: var(--text); }
    .client-row:hover { background: var(--surface2); }
    .client-row .avatar { width: 36px; height: 36px; border-radius: 8px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px;
      border: 1px solid var(--border);
      width: fit-content;
    }

    .tab {
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      transition: all 0.15s;
      border: none;
      background: transparent;
    }

    .tab.active {
      background: var(--primary);
      color: white;
    }

    .tab:hover:not(.active) {
      color: var(--text);
      background: var(--surface2);
    }

    /* Cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .card:hover { border-color: var(--primary); }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-header h3 {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
    }

    .card-body { padding: 16px 20px; }

    .card-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-purple { background: rgba(99,102,241,0.15); color: var(--primary); }
    .badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }

    /* Detail rows */
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }

    .detail-row .label { color: var(--text2); }

    /* Score bar */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .score-bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .score-value {
      font-size: 14px;
      font-weight: 700;
      min-width: 40px;
      text-align: right;
    }

    /* Platform icons */
    .platforms {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .platform-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .platform-facebook { background: rgba(24,119,242,0.15); color: #1877f2; }
    .platform-instagram { background: rgba(228,64,95,0.15); color: #e4405f; }
    .platform-tiktok { background: rgba(0,0,0,0.3); color: #fff; border: 1px solid var(--border); }

    /* Media preview */
    .media-strip {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .media-strip img {
      width: 100px;
      height: 75px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }

    .media-strip img:first-child {
      width: 160px;
      height: 120px;
      border-color: var(--primary);
    }

    .media-strip img:hover {
      border-color: var(--primary);
      transform: scale(1.03);
    }

    .video-badge {
      position: relative;
      display: inline-block;
    }

    .video-badge::after {
      content: '▶';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    /* Creative preview */
    .creative-preview {
      background: var(--bg);
      border-radius: 8px;
      padding: 14px;
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      color: white;
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
    }

    /* Approval actions */
    .approval-actions {
      display: flex;
      gap: 8px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }

    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text2);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--green);
      color: var(--text);
      padding: 14px 24px;
      border-radius: var(--radius);
      font-size: 14px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Responsive */
    @media (max-width: 1100px) { .dash-grid { grid-template-columns: 1fr; } .dash-grid-3 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) {
      .container { padding: 16px; }
      .card-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .dash-grid-3 { grid-template-columns: 1fr; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Campaign Dashboard
  </h1>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="runPipeline()">Run Pipeline</button>
    <div id="user-info" style="display:flex;align-items:center;gap:8px;margin-left:8px;padding-left:12px;border-left:1px solid var(--border)"></div>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stats-grid" id="stats-grid"></div>

  <!-- Dashboard Content -->
  <div id="dashboard-content"></div>
</div>

<script src="/dashboard/shared.js"></script>
<script>
const API = window.location.origin;
let currentTab = 'candidates';
let currentUser = null;

function getAuthHeaders() {
  const token = localStorage.getItem('auth_token');
  return token ? { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    credentials: 'include',
    headers: getAuthHeaders(),
    ...opts,
  });
  if (res.status === 401) {
    window.location.href = '/dashboard/login.html';
    return {};
  }
  return res.json();
}

async function checkAuth() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include', headers: getAuthHeaders() });
    if (!res.ok) throw new Error();
    const data = await res.json();
    currentUser = data.user;
    updateUserUI();
  } catch {
    window.location.href = '/dashboard/login.html';
  }
}

function updateUserUI() {
  const el = document.getElementById('user-info');
  if (el && currentUser) {
    el.innerHTML = `
      <span style="color:var(--text2);font-size:13px">${currentUser.name}</span>
      ${currentUser.role === 'admin' ? '<a class="btn" href="/dashboard/users.html" style="text-decoration:none;padding:6px 12px;font-size:12px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Users</a>' : ''}
      <a class="btn" href="/dashboard/video-presets.html" style="text-decoration:none;padding:6px 12px;font-size:12px">Video Presets</a>
      <button class="btn" style="padding:6px 12px;font-size:12px" onclick="handleLogout()">Logout</button>
    `;
  }
}

async function handleLogout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include', headers: getAuthHeaders() });
  localStorage.removeItem('auth_token');
  localStorage.removeItem('auth_user');
  window.location.href = '/dashboard/login.html';
}

async function loadData() {
  await Promise.all([loadStats(), loadDashboardContent()]);
}

async function loadStats() {
  const data = await api('/api/dashboard/summary');
  const readyPct = data.total_entities > 0 ? Math.round(data.campaign_ready / data.total_entities * 100) : 0;
  const apprRate = (data.approvals_approved + data.approvals_pending + data.approvals_rejected) > 0
    ? Math.round(data.approvals_approved / (data.approvals_approved + data.approvals_pending + data.approvals_rejected) * 100) : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(99,102,241,.15);color:var(--primary)">&#127968;</div>
      <div><div class="label">Properties</div><div class="value">${data.total_entities}</div>
      <div class="sub"><span class="trend-up">&#9650; ${readyPct}%</span> campaign ready</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(59,130,246,.15);color:var(--blue)">&#127919;</div>
      <div><div class="label">Creatives</div><div class="value">${data.total_variants}</div>
      <div class="sub">${data.total_batches} batches generated</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(234,179,8,.15);color:var(--yellow)">&#9201;</div>
      <div><div class="label">Pending</div><div class="value" style="color:var(--yellow)">${data.approvals_pending}</div>
      <div class="sub">${data.approvals_approved} approved</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(34,197,94,.15);color:var(--green)">&#9989;</div>
      <div><div class="label">QA Pass Rate</div><div class="value" style="color:var(--green)">${data.qa_pass}</div>
      <div class="sub">${data.qa_warn} warn, ${data.qa_fail} fail</div></div>
    </div>
  `;
  window._dashData = data;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  loadTab(tab);
}

async function loadDashboardContent() {
  const el = document.getElementById('dashboard-content');
  const data = window._dashData || await api('/api/dashboard/summary');
  const clients = await api('/api/clients');

  const qaTotal = (data.qa_pass||0) + (data.qa_warn||0) + (data.qa_fail||0);
  const qaPassPct = qaTotal ? Math.round((data.qa_pass||0) / qaTotal * 100) : 0;
  const qaWarnPct = qaTotal ? Math.round((data.qa_warn||0) / qaTotal * 100) : 0;

  const apprTotal = (data.approvals_approved||0) + (data.approvals_pending||0) + (data.approvals_rejected||0);
  const apprApprovedPct = apprTotal ? Math.round((data.approvals_approved||0) / apprTotal * 100) : 0;
  const apprPendingPct = apprTotal ? Math.round((data.approvals_pending||0) / apprTotal * 100) : 0;

  el.innerHTML = `
    <!-- Row 1: Campaign Funnel (wide) + Approval Donut -->
    <div class="dash-grid">
      <div class="dash-card">
        <h3><span class="card-icon" style="background:rgba(59,130,246,.15);color:var(--blue)">&#128200;</span> Campaign Funnel</h3>
        <div style="display:flex;flex-direction:column;gap:14px">
          ${funnelBar('Properties', data.total_entities, data.total_entities, 'var(--blue)')}
          ${funnelBar('Campaign Ready', data.campaign_ready, data.total_entities, 'var(--primary)')}
          ${funnelBar('Candidates Selected', data.selected_candidates, data.total_entities, '#a78bfa')}
          ${funnelBar('Creatives Generated', data.total_variants, Math.max(data.total_variants, data.total_entities), 'var(--orange)')}
          ${funnelBar('Approved Ads', data.approvals_approved, Math.max(data.total_variants, 1), 'var(--green)')}
        </div>
      </div>
      <div class="dash-card">
        <h3><span class="card-icon" style="background:rgba(234,179,8,.15);color:var(--yellow)">&#128203;</span> Approval Status</h3>
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
          <div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(var(--green) 0% ${apprApprovedPct}%, var(--yellow) ${apprApprovedPct}% ${apprApprovedPct+apprPendingPct}%, var(--red) ${apprApprovedPct+apprPendingPct}% 100%);display:flex;align-items:center;justify-content:center">
            <div style="width:84px;height:84px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700">${apprTotal}</div>
          </div>
          <div style="display:flex;gap:16px;font-size:12px">
            <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--green)"></span> ${data.approvals_approved||0}</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--yellow)"></span> ${data.approvals_pending||0}</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--red)"></span> ${data.approvals_rejected||0}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Row 2: QA + Clients + Quick Actions -->
    <div class="dash-grid-3">
      <div class="dash-card">
        <h3><span class="card-icon" style="background:rgba(34,197,94,.15);color:var(--green)">&#9989;</span> QA Overview</h3>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
          <div style="width:80px;height:80px;border-radius:50%;background:conic-gradient(var(--green) 0% ${qaPassPct}%, var(--yellow) ${qaPassPct}% ${qaPassPct+qaWarnPct}%, var(--red) ${qaPassPct+qaWarnPct}% 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <div style="width:56px;height:56px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700">${qaPassPct}%</div>
          </div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--green)">&#9679; Pass</span><span style="font-weight:600">${data.qa_pass||0}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--yellow)">&#9679; Warn</span><span style="font-weight:600">${data.qa_warn||0}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--red)">&#9679; Fail</span><span style="font-weight:600">${data.qa_fail||0}</span></div>
          </div>
        </div>
      </div>

      <div class="dash-card">
        <h3><span class="card-icon" style="background:rgba(99,102,241,.15);color:var(--primary)">&#128101;</span> Clients (${clients.length})</h3>
        <div style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent">
          ${clients.length ? clients.map(c => `

function funnelBar(label, value, max, color) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;

  </div>`;
}

// ── Helpers ──

function renderEntityMedia(snapshot) {
  if (!snapshot) return '';
  const hero = snapshot.hero_image;
  const gallery = snapshot.gallery || [];
  const videos = snapshot.videos || [];
  return renderMediaStrip({
    hero_image: hero,
    selected_images: gallery,
    selected_video: videos[0] || null,
  });
}

function renderMediaStrip(mediaPlan) {
  if (!mediaPlan) return '';
  const images = mediaPlan.selected_images || [];
  const video = mediaPlan.selected_video;
  const hero = mediaPlan.hero_image;

  // Collect all media to show
  const allImages = [];
  if (hero && !images.includes(hero)) allImages.push(hero);
  allImages.push(...images);

  if (allImages.length === 0 && !video) return '';

  let html = '<div class="media-strip">';

  // Show video thumbnail if available
  if (video) {
    if (video.includes('youtube') || video.includes('youtu.be')) {
      const videoId = video.match(/(?:v=|youtu\.be\/)([^&\s]+)/)?.[1];
      if (videoId) {
        html += `<div class="video-badge"><img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" alt="Video" onclick="window.open('${escapeHtml(video)}','_blank')"></div>`;
      }
    } else {
      html += `<div class="video-badge" style="width:160px;height:120px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:1px solid var(--border)" onclick="window.open('${escapeHtml(video)}','_blank')"><span style="font-size:11px;color:var(--text2);position:absolute;bottom:6px">Video</span></div>`;
    }
  }

  // Show images
  for (const img of allImages.slice(0, 6)) {
    html += `<img src="${escapeHtml(img)}" alt="Property" onclick="openLightbox('${escapeHtml(img)}')" loading="lazy">`;
  }

  if (allImages.length > 6) {
    html += `<div style="min-width:60px;height:75px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);flex-shrink:0">+${allImages.length - 6}</div>`;
  }

  html += '</div>';
  return html;
}

function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.onclick = () => lb.remove();
  lb.innerHTML = `<button class="lightbox-close" onclick="this.parentElement.remove()">✕</button><img src="${escapeHtml(src)}" alt="Full size">`;
  document.body.appendChild(lb);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── Init ──
requireLogin().then(() => { injectNav('dashboard'); loadData(); });
</script>
